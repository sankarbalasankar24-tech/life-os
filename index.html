<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0f1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Life OS</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
/* ── Reset & base ───────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1117;
  --bg2:#171a24;
  --bg3:#1f2332;
  --card:#1e2130;
  --card2:#252a3a;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --text:#eef0f6;
  --muted:#8a8fa8;
  --faint:#4a4f66;
  --accent:#6c8dfa;
  --accent2:#4a6cf7;
  --green:#34d399;
  --amber:#fbbf24;
  --red:#f87171;
  --pink:#f472b6;
  --teal:#2dd4bf;
  --font:'DM Sans',sans-serif;
  --serif:'DM Serif Display',serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --nav:64px;
  --radius:16px;
  --radius-sm:10px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:var(--font);color:var(--text);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 14px;font-size:15px;width:100%;outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
select option{background:var(--bg2)}
textarea{resize:none;line-height:1.5}
a{color:var(--accent);text-decoration:none}

/* ── Layout ─────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
#screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav) + var(--safe-bot) + 12px);display:none;animation:fadeUp .22s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── Header ─────────────────────────────────────────────── */
.page-header{padding:20px 20px 8px;position:sticky;top:0;z-index:10;background:var(--bg)}
.page-header h1{font-family:var(--serif);font-size:26px;font-weight:400;letter-spacing:-0.3px}
.page-header .sub{color:var(--muted);font-size:13px;margin-top:2px}

/* ── Nav bar ────────────────────────────────────────────── */
#nav{height:calc(var(--nav) + var(--safe-bot));padding-bottom:var(--safe-bot);
  display:flex;background:rgba(15,17,23,0.92);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);position:relative;z-index:100;flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--faint);font-size:10px;letter-spacing:.5px;text-transform:uppercase;font-weight:500;
  transition:color .18s;padding-top:2px}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:transform .18s}
.nav-btn.active svg{transform:scale(1.12)}

/* ── Cards ──────────────────────────────────────────────── */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:18px;margin:0 16px 12px}
.card-sm{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);padding:14px 16px}

/* ── Stat row ───────────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 12px}
.stat-card{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);
  padding:16px;display:flex;flex-direction:column;gap:4px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:500}
.stat-val{font-size:26px;font-weight:600;line-height:1.1}
.stat-val.green{color:var(--green)}
.stat-val.amber{color:var(--amber)}
.stat-val.accent{color:var(--accent)}
.stat-val.red{color:var(--red)}

/* ── Task items ─────────────────────────────────────────── */
.task-list{display:flex;flex-direction:column;gap:8px;padding:0 16px}
.task-item{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:14px 16px;transition:opacity .3s,border-color .2s;
  animation:fadeUp .2s ease}
.task-item.done{opacity:.4}
.task-item.done .task-title{text-decoration:line-through}
.check-btn{width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s;cursor:pointer}
.check-btn.checked{background:var(--green);border-color:var(--green)}
.check-btn svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .15s}
.check-btn.checked svg{opacity:1}
.task-body{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{font-size:11px;color:var(--muted);margin-top:2px}
.prio-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.p1{background:var(--red)}.p2{background:var(--amber)}.p3{background:var(--accent)}.p4,.p5{background:var(--faint)}

/* ── Priority badge ─────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge.goal{background:rgba(108,141,250,.15);color:var(--accent);border:1px solid rgba(108,141,250,.25)}
.badge.simple{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.2)}

/* ── Progress bar ───────────────────────────────────────── */
.prog-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:10px}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent2),var(--teal));transition:width .6s ease}

/* ── Section title ──────────────────────────────────────── */
.sec-title{padding:16px 20px 8px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600}

/* ── FAB ────────────────────────────────────────────────── */
#fab{position:fixed;bottom:calc(var(--nav) + var(--safe-bot) + 16px);right:20px;
  width:52px;height:52px;border-radius:50%;background:var(--accent2);
  display:flex;align-items:center;justify-content:center;z-index:200;
  box-shadow:0 4px 24px rgba(74,108,247,.45);transition:transform .15s,opacity .15s}
#fab:active{transform:scale(.92)}
#fab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── Bottom sheet ───────────────────────────────────────── */
#sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px)}
#sheet-overlay.open{opacity:1;pointer-events:auto}
#bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;z-index:400;
  padding:12px 20px 20px;padding-bottom:calc(20px + var(--safe-bot));
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
#bottom-sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--faint);border-radius:2px;margin:0 auto 18px}
.sheet-title{font-size:17px;font-weight:600;margin-bottom:18px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.btn-primary{width:100%;padding:15px;border-radius:var(--radius-sm);background:var(--accent2);
  color:#fff;font-size:15px;font-weight:600;text-align:center;transition:opacity .15s;margin-top:4px}
.btn-primary:active{opacity:.8}
.btn-row{display:flex;gap:10px;margin-bottom:14px}
.btn-seg{flex:1;padding:10px;border-radius:8px;background:var(--bg3);color:var(--muted);font-size:13px;
  font-weight:500;text-align:center;transition:all .15s;border:1px solid var(--border)}
.btn-seg.active{background:rgba(108,141,250,.2);color:var(--accent);border-color:rgba(108,141,250,.4)}

/* ── Finance ────────────────────────────────────────────── */
.fin-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}
.fin-row:last-child{border-bottom:none}
.fin-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.fin-body{flex:1}
.fin-title{font-size:14px;font-weight:500}
.fin-cat{font-size:11px;color:var(--muted);margin-top:1px}
.fin-amt{font-size:15px;font-weight:600}
.fin-amt.inc{color:var(--green)}.fin-amt.exp{color:var(--red)}

/* ── Goals screen ───────────────────────────────────────── */
.goal-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
  padding:18px;margin:0 16px 12px;animation:fadeUp .2s ease}
.goal-title{font-size:16px;font-weight:600;margin-bottom:4px}
.goal-desc{font-size:13px;color:var(--muted);margin-bottom:12px}
.goal-prog-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.goal-prog-label span:last-child{color:var(--accent);font-weight:600}
.subtask-list{margin-top:14px;display:flex;flex-direction:column;gap:6px}
.subtask-item{display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--bg3);border-radius:8px;font-size:13px}
.subtask-item.done{opacity:.45}
.subtask-item.done span{text-decoration:line-through}

/* ── Today screen ───────────────────────────────────────── */
.today-banner{margin:0 16px 16px;background:linear-gradient(135deg,rgba(74,108,247,.25),rgba(45,212,191,.15));
  border:1px solid rgba(108,141,250,.25);border-radius:var(--radius);padding:20px}
.today-date{font-size:13px;color:var(--muted);font-weight:500;letter-spacing:.3px}
.today-greeting{font-family:var(--serif);font-size:24px;margin-top:4px}
.today-sub{font-size:13px;color:var(--muted);margin-top:6px}

/* ── Empty state ────────────────────────────────────────── */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-text{font-size:14px;line-height:1.6}

/* ── Toast ──────────────────────────────────────────────── */
#toast{position:fixed;top:calc(var(--safe-top) + 16px);left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--card2);border:1px solid var(--border2);border-radius:10px;
  padding:10px 18px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s ease;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── Tabs ───────────────────────────────────────────────── */
.tabs{display:flex;gap:8px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;
  background:var(--card);border:1px solid var(--border);color:var(--muted);white-space:nowrap;transition:all .15s}
.tab.active{background:rgba(108,141,250,.2);color:var(--accent);border-color:rgba(108,141,250,.35)}

/* ── Settings ───────────────────────────────────────────── */
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;
  border-bottom:1px solid var(--border)}
.settings-item:last-child{border-bottom:none}
.settings-label{font-size:14px;font-weight:500}
.settings-sub{font-size:12px;color:var(--muted);margin-top:2px}
.settings-url{width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--radius-sm);font-size:13px;color:var(--muted);font-family:monospace;margin-top:10px}

/* ── Loading spinner ────────────────────────────────────── */
.spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Scrollbar ──────────────────────────────────────────── */
::-webkit-scrollbar{width:0;height:0}

/* ── Ripple ─────────────────────────────────────────────── */
.ripple{position:relative;overflow:hidden}
.ripple::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.05);opacity:0;border-radius:inherit;transition:opacity .3s}
.ripple:active::after{opacity:1}
</style>
</head>
<body>
<div id="app">
  <!-- ── Screens ──────────────────────────────────────── -->
  <div id="screens">

    <!-- TODAY -->
    <div class="screen active" id="screen-today">
      <div class="page-header">
        <h1>Today</h1>
        <div class="sub" id="today-date-sub">Loading...</div>
      </div>
      <div id="today-content"><div class="spinner"></div></div>
    </div>

    <!-- TASKS -->
    <div class="screen" id="screen-tasks">
      <div class="page-header">
        <h1>Tasks</h1>
        <div class="sub">Pending items</div>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="filterTasks('all')">All</button>
        <button class="tab" onclick="filterTasks('today')">Due Today</button>
        <button class="tab" onclick="filterTasks('simple')">Quick tasks</button>
        <button class="tab" onclick="filterTasks('subtask')">Sub-tasks</button>
        <button class="tab" onclick="filterTasks('done')">Done</button>
      </div>
      <div id="tasks-content"><div class="spinner"></div></div>
    </div>

    <!-- GOALS -->
    <div class="screen" id="screen-goals">
      <div class="page-header">
        <h1>Goals</h1>
        <div class="sub">Long-term projects &amp; progress</div>
      </div>
      <div id="goals-content"><div class="spinner"></div></div>
    </div>

    <!-- FINANCE -->
    <div class="screen" id="screen-finance">
      <div class="page-header">
        <h1>Finance</h1>
        <div class="sub" id="fin-month-sub">This month</div>
      </div>
      <div id="finance-content"><div class="spinner"></div></div>
    </div>

    <!-- MORE (Settings) -->
    <div class="screen" id="screen-more">
      <div class="page-header">
        <h1>Settings</h1>
        <div class="sub">Configure Life OS</div>
      </div>
      <div id="more-content"></div>
    </div>

  </div>

  <!-- ── Bottom Nav ───────────────────────────────────── -->
  <nav id="nav">
    <button class="nav-btn active ripple" onclick="goto('today')" id="nav-today">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Today
    </button>
    <button class="nav-btn ripple" onclick="goto('tasks')" id="nav-tasks">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      Tasks
    </button>
    <button class="nav-btn ripple" onclick="goto('goals')" id="nav-goals">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      Goals
    </button>
    <button class="nav-btn ripple" onclick="goto('finance')" id="nav-finance">
      <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 1 0 0 7h5a3.5 3.5 0 1 1 0 7H6"/></svg>
      Finance
    </button>
    <button class="nav-btn ripple" onclick="goto('more')" id="nav-more">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      More
    </button>
  </nav>
</div>

<!-- ── FAB ───────────────────────────────────────────── -->
<button id="fab" onclick="openAddSheet()" aria-label="Add new">
  <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- ── Bottom Sheet ──────────────────────────────────── -->
<div id="sheet-overlay" onclick="closeSheet()"></div>
<div id="bottom-sheet">
  <div class="sheet-handle"></div>
  <div id="sheet-inner"></div>
</div>

<!-- ── Toast ────────────────────────────────────────── -->
<div id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const CFG = {
  scriptUrl: localStorage.getItem('scriptUrl') || '',
  vapidKey:  localStorage.getItem('vapidKey')  || '',
};

// ── STATE ─────────────────────────────────────────────────
let state = {
  currentScreen: 'today',
  tasks: [], goals: [], finance: null, taskFilter: 'all'
};

// ── API ───────────────────────────────────────────────────
async function api(action, params = {}) {
  if (!CFG.scriptUrl) { showToast('⚙️ Set your Script URL in Settings'); return null; }
  try {
    const url = CFG.scriptUrl + '?action=' + action + '&' + new URLSearchParams(params);
    const r = await fetch(url);
    return await r.json();
  } catch(e) { showToast('Connection error'); return null; }
}

async function apiPost(action, data = {}) {
  if (!CFG.scriptUrl) { showToast('⚙️ Set your Script URL in Settings'); return null; }
  try {
    const r = await fetch(CFG.scriptUrl, {
      method: 'POST',
      body: JSON.stringify({ action, data })
    });
    return await r.json();
  } catch(e) { showToast('Connection error'); return null; }
}

// ── NAVIGATION ────────────────────────────────────────────
function goto(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  document.getElementById('nav-' + screen).classList.add('active');
  state.currentScreen = screen;
  loadScreen(screen);
}

function loadScreen(s) {
  if (s === 'today')   loadToday();
  if (s === 'tasks')   loadTasks();
  if (s === 'goals')   loadGoals();
  if (s === 'finance') loadFinance();
  if (s === 'more')    renderSettings();
}

// ── TODAY ─────────────────────────────────────────────────
async function loadToday() {
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('today-date-sub').textContent =
    days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();

  const hour = now.getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';

  const data = await api('getToday');
  const el = document.getElementById('today-content');

  if (!data) {
    el.innerHTML = renderConfigPrompt();
    return;
  }

  const tasks = data.tasks || [];
  const events = data.events || [];
  const high = tasks.filter(t => t.Priority <= 2).slice(0, 3);
  const rest = tasks.slice(0, 8);

  el.innerHTML = `
    <div class="today-banner">
      <div class="today-date">${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}</div>
      <div class="today-greeting">${greeting} 👋</div>
      <div class="today-sub">${tasks.length} tasks pending${events.length ? ' · ' + events.length + ' event today' : ''}</div>
    </div>
    ${events.length ? `
    <div class="sec-title">Today's Events</div>
    <div style="padding:0 16px;margin-bottom:4px">
      ${events.map(e => `<div class="card-sm ripple" style="margin-bottom:8px">
        <div style="font-size:13px;font-weight:600;color:var(--amber)">📅 ${e.Title}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px">${e.Notes||e.Type||''}</div>
      </div>`).join('')}
    </div>` : ''}
    ${high.length ? `
    <div class="sec-title">Priority for today</div>
    <div class="task-list">
      ${high.map(t => renderTaskItem(t, true)).join('')}
    </div>` : ''}
    <div class="sec-title">All pending</div>
    <div class="task-list">
      ${rest.length ? rest.map(t => renderTaskItem(t, true)).join('') :
        '<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">All clear! Add tasks with the + button.</div></div>'}
    </div>
    <div style="padding:0 16px;margin-top:8px">
      <button class="btn-primary ripple" onclick="openNightLog()" style="background:var(--bg3);color:var(--text);border:1px solid var(--border2)">
        🌙 Log today's summary
      </button>
    </div>
  `;
}

function renderConfigPrompt() {
  return `<div class="empty" style="padding:60px 30px">
    <div class="empty-icon">⚙️</div>
    <div class="empty-text">Set your Google Apps Script URL in <b>Settings</b> to connect your data.</div>
    <button class="btn-primary ripple" onclick="goto('more')" style="margin-top:16px;max-width:200px;margin-left:auto;margin-right:auto">Go to Settings</button>
  </div>`;
}

// ── TASKS ─────────────────────────────────────────────────
async function loadTasks() {
  const data = await api('getTasks');
  if (!data) return;
  state.tasks = Array.isArray(data) ? data : [];
  renderTasks();
}

function filterTasks(f) {
  state.taskFilter = f;
  document.querySelectorAll('#screen-tasks .tab').forEach((t,i) => {
    t.classList.toggle('active', ['all','today','simple','subtask','done'][i] === f);
  });
  renderTasks();
}

function renderTasks() {
  const today = new Date().toISOString().slice(0,10);
  let list = state.tasks;
  if (state.taskFilter === 'today')   list = list.filter(t => t.DueDate === today);
  if (state.taskFilter === 'simple')  list = list.filter(t => t.Type === 'simple' && t.Status !== 'Done');
  if (state.taskFilter === 'subtask') list = list.filter(t => t.Type === 'subtask');
  if (state.taskFilter === 'done')    list = list.filter(t => t.Status === 'Done');
  if (state.taskFilter === 'all')     list = list.filter(t => t.Status !== 'Done');

  const el = document.getElementById('tasks-content');
  el.innerHTML = list.length
    ? `<div class="task-list">${list.map(t => renderTaskItem(t)).join('')}</div>`
    : `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No tasks here. Tap + to add one.</div></div>`;
}

function renderTaskItem(t, compact) {
  const done = t.Status === 'Done';
  const prio = Math.min(5, Math.max(1, Number(t.Priority) || 3));
  const due = t.DueDate ? `Due ${formatDate(t.DueDate)}` : '';
  const type = t.GoalID ? `<span class="badge goal">Goal task</span>` : '';
  return `<div class="task-item${done?' done':''}" id="ti-${t.ID}">
    <div class="check-btn${done?' checked':''}" onclick="toggleTask('${t.ID}','${done?'Pending':'Done'}')">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="task-body">
      <div class="task-title">${escHtml(t.Title||'')}</div>
      ${!compact && (due||type) ? `<div class="task-meta">${due}${due&&type?' · ':''}${type}</div>` : ''}
      ${compact && due ? `<div class="task-meta">${due}</div>` : ''}
    </div>
    <div class="prio-dot p${prio}"></div>
  </div>`;
}

async function toggleTask(id, newStatus) {
  const el = document.getElementById('ti-' + id);
  if (el) el.style.opacity = '0.5';
  const res = await apiPost('updateTask', { id, Status: newStatus });
  if (res?.ok) {
    const t = state.tasks.find(x => x.ID === id);
    if (t) t.Status = newStatus;
    showToast(newStatus === 'Done' ? '✅ Marked done!' : '↩️ Reopened');
    renderTasks();
    if (state.currentScreen === 'today') loadToday();
  }
}

          ${g.Description ? `<div class="goal-desc">${escHtml(g.Description)}</div>` : ''}

        <span style="color:var(--muted);font-size:12px">${(g.subTasks||[]).filter(t=>t.Status==='Done').length} / ${(g.subTasks||[]).length} sub-tasks</span>

// ── FINANCE ───────────────────────────────────────────────
async function loadFinance() {
  const now = new Date();

  const el = document.getElementById('finance-content');
  if (!data) { el.innerHTML = renderConfigPrompt(); return; }

  const cats = {
    Food:'🍛', Transport:'🚗', Shopping:'🛍️', Health:'💊', Bills:'💡',
    Entertainment:'🎬', Education:'📚', Family:'👨‍👩‍👧', Savings:'💰', Other:'📦',
    Salary:'💼', Freelance:'💻', Investment:'📈', Gift:'🎁'
  };

  state.finance = data;
  const rows = (data.rows||[]).slice().reverse();

  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Income</div><div class="stat-val green">₹${fmt(data.income)}</div></div>
      <div class="stat-card"><div class="stat-label">Expenses</div><div class="stat-val red">₹${fmt(data.expense)}</div></div>
      <div class="stat-card"><div class="stat-label">Balance</div><div class="stat-val ${data.balance>=0?'accent':'red'}">₹${fmt(data.balance)}</div></div>
      <div class="stat-card"><div class="stat-label">Transactions</div><div class="stat-val accent">${rows.length}</div></div>
    </div>
    ${Object.keys(data.byCategory||{}).length ? `
    <div class="sec-title">Spending by category</div>
    <div style="padding:0 16px;margin-bottom:12px">
      <div class="card" style="padding:14px 16px">
        ${Object.entries(data.byCategory).sort((a,b)=>b[1]-a[1]).map(([k,v]) => {
          const pct = data.expense ? Math.round(v/data.expense*100) : 0;
          return `<div style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px">
              <span>${cats[k]||'•'} ${k}</span>
              <span style="font-weight:600">₹${fmt(v)} <span style="color:var(--muted);font-weight:400">${pct}%</span></span>
            </div>
            <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--red),var(--amber))"></div></div>
          </div>`;
        }).join('')}
      </div>

    <div class="sec-title">Recent transactions</div>
    <div class="card" style="margin-bottom:24px">
      ${rows.length ? rows.map(r => `
        <div class="fin-row">
          <div class="fin-icon" style="background:${r.Type==='Income'?'rgba(52,211,153,.15)':'rgba(248,113,113,.15)'}">
            ${cats[r.Category]||'•'}
          </div>
          <div class="fin-body">
            <div class="fin-title">${escHtml(r.Note||r.Category||'Transaction')}</div>
            <div class="fin-cat">${r.Category||''} · ${formatDate(r.Date)}</div>
          </div>
          <div class="fin-amt ${r.Type==='Income'?'inc':'exp'}">${r.Type==='Income'?'+':'-'}₹${fmt(Number(r.Amount))}</div>
        </div>`).join('') :
        `<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">No transactions this month</div>`}
    </div>
  `;
}

// ── PUSH ──────────────────────────────────────────────────
async function requestPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    showToast('Push not supported on this browser'); return;
  }
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') { showToast('Permission denied'); return; }
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: CFG.vapidKey || undefined
    });
    const token = JSON.stringify(sub);
    await apiPost('registerToken', { token });
    showToast('🔔 Push notifications enabled!');
  } catch(e) {
    showToast('Push setup failed: ' + e.message);
  }
}

// ── SHEET HELPERS ─────────────────────────────────────────
function openSheet() {
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('bottom-sheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('bottom-sheet').classList.remove('open');
}

// ── TOAST ─────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── UTILS ─────────────────────────────────────────────────
function fmt(n) {
  return Number(n||0).toLocaleString('en-IN');
}
function formatDate(d) {
  if (!d) return '';
  try {
    const dt = new Date(d);
    return dt.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
  } catch(e) { return String(d); }
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── SERVICE WORKER ────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ── BOOT ──────────────────────────────────────────────────
loadToday();
