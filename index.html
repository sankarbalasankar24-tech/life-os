<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0d0f18"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Life OS</title>
<link rel="manifest" href="/manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0f18;--bg2:#141720;--bg3:#1a1e2e;--card:#1c2030;--card2:#222840;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#eef0f8;--muted:#8890b0;--faint:#404568;
  --accent:#5b8af0;--accent2:#3d6ee8;
  --green:#2ecc8a;--amber:#f5a623;--red:#f0605a;--pink:#e8609a;--teal:#26c6b8;--purple:#9b72f0;
  --font:'DM Sans',sans-serif;--serif:'DM Serif Display',serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  --nav:62px;--r:14px;--rs:9px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:var(--font);color:var(--text);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);padding:11px 14px;font-size:14px;width:100%;outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
select option{background:var(--bg2)}
textarea{resize:none;line-height:1.6}
::-webkit-scrollbar{width:0;height:0}

/* Layout */
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
#screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  padding-bottom:calc(var(--nav) + var(--safe-bot) + 16px);display:none;animation:fadeUp .2s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Header */
.page-header{padding:18px 18px 6px;position:sticky;top:0;z-index:10;background:var(--bg)}
.page-header h1{font-family:var(--serif);font-size:25px;font-weight:400;letter-spacing:-.3px}
.page-header .sub{color:var(--muted);font-size:12px;margin-top:2px}
.header-row{display:flex;align-items:center;justify-content:space-between}

/* Nav */
#nav{height:calc(var(--nav) + var(--safe-bot));padding-bottom:var(--safe-bot);
  display:flex;background:rgba(13,15,24,.94);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);z-index:100;flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;color:var(--faint);font-size:9.5px;letter-spacing:.4px;text-transform:uppercase;
  font-weight:500;transition:color .15s;padding-top:2px}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;
  stroke-linecap:round;stroke-linejoin:round;transition:transform .15s}
.nav-btn.active svg{transform:scale(1.1)}

/* Cards */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin:0 14px 10px}
.card-sm{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:12px 14px}

/* Stat grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 14px 10px}
.stat-card{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:14px}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:500;margin-bottom:3px}
.stat-val{font-size:24px;font-weight:600;line-height:1}
.g{color:var(--green)}.a{color:var(--amber)}.ac{color:var(--accent)}.r{color:var(--red)}.pk{color:var(--pink)}.pu{color:var(--purple)}

/* Section title */
.sec-title{padding:14px 18px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600}

/* Tabs */
.tabs{display:flex;gap:6px;padding:6px 14px 12px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;
  background:var(--card);border:1px solid var(--border);color:var(--muted);white-space:nowrap;transition:all .15s}
.tab.active{background:rgba(91,138,240,.18);color:var(--accent);border-color:rgba(91,138,240,.35)}

/* Task items */
.task-list{display:flex;flex-direction:column;gap:7px;padding:0 14px}
.task-item{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);
  display:flex;align-items:center;gap:11px;padding:12px 14px;transition:opacity .3s;animation:fadeUp .2s ease}
.task-item.done{opacity:.38}
.task-item.done .task-title{text-decoration:line-through}
.check-btn{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer}
.check-btn.chk{background:var(--green);border-color:var(--green)}
.check-btn svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .12s}
.check-btn.chk svg{opacity:1}
.task-body{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{font-size:11px;color:var(--muted);margin-top:2px}
.prio-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.p1{background:var(--red)}.p2{background:var(--amber)}.p3{background:var(--accent)}.p4,.p5{background:var(--faint)}

/* Progress ring */
.prog-ring{display:flex;align-items:center;justify-content:center;margin:0 14px 10px}
.prog-ring-wrap{position:relative;width:100px;height:100px}
.prog-ring-wrap svg{transform:rotate(-90deg)}
.prog-ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.prog-ring-pct{font-size:20px;font-weight:600;color:var(--accent)}
.prog-ring-emoji{font-size:18px}

/* Progress bar */
.prog-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent2),var(--teal));transition:width .5s ease}

/* Goal card */
.goal-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin:0 14px 10px;animation:fadeUp .2s ease}
.goal-title{font-size:15px;font-weight:600;margin-bottom:3px}
.goal-desc{font-size:12px;color:var(--muted);margin-bottom:10px}
.subtask-list{margin-top:12px;display:flex;flex-direction:column;gap:5px}
.subtask-item{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--bg3);border-radius:8px;font-size:13px}
.subtask-item.done{opacity:.4}.subtask-item.done span{text-decoration:line-through}

/* Finance rows */
.fin-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.fin-row:last-child{border-bottom:none}
.fin-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.fin-body{flex:1;min-width:0}
.fin-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fin-cat{font-size:11px;color:var(--muted);margin-top:1px}
.fin-amt{font-size:14px;font-weight:600;white-space:nowrap}
.inc{color:var(--green)}.exp{color:var(--red)}

/* Stock rows */
.stock-row{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);
  padding:14px;margin-bottom:8px;animation:fadeUp .2s ease}
.stock-ticker{font-size:15px;font-weight:600;letter-spacing:.5px}
.stock-meta{font-size:11px;color:var(--muted);margin-top:2px}
.stock-pl{font-size:15px;font-weight:600}
.stock-detail{display:flex;gap:16px;margin-top:8px}
.stock-detail-item{font-size:11px;color:var(--muted)}
.stock-detail-item span{color:var(--text);font-weight:500}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;margin-right:4px}
.badge-goal{background:rgba(91,138,240,.15);color:var(--accent);border:1px solid rgba(91,138,240,.25)}
.badge-green{background:rgba(46,204,138,.12);color:var(--green);border:1px solid rgba(46,204,138,.2)}
.badge-amber{background:rgba(245,166,35,.12);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.badge-red{background:rgba(240,96,90,.12);color:var(--red);border:1px solid rgba(240,96,90,.2)}

/* FAB */
#fab{position:fixed;bottom:calc(var(--nav) + var(--safe-bot) + 14px);right:17px;
  width:50px;height:50px;border-radius:50%;background:var(--accent2);
  display:flex;align-items:center;justify-content:center;z-index:200;
  box-shadow:0 4px 20px rgba(61,110,232,.4);transition:transform .13s}
#fab:active{transform:scale(.9)}
#fab svg{width:21px;height:21px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Search bar */
.search-bar{display:flex;align-items:center;gap:10px;margin:0 14px 10px;background:var(--card);
  border:1px solid var(--border2);border-radius:var(--rs);padding:10px 14px}
.search-bar svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.search-bar input{background:none;border:none;outline:none;font-size:14px;flex:1;padding:0;color:var(--text)}

/* Bottom sheet */
#sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(3px)}
#sheet-overlay.open{opacity:1;pointer-events:auto}
#bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:18px 18px 0 0;
  z-index:400;padding:10px 18px 18px;padding-bottom:calc(18px + var(--safe-bot));
  max-height:92vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1)}
#bottom-sheet.open{transform:translateY(0)}
.sheet-handle{width:34px;height:4px;background:var(--faint);border-radius:2px;margin:0 auto 16px}
.sheet-title{font-size:16px;font-weight:600;margin-bottom:16px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.btn-primary{width:100%;padding:14px;border-radius:var(--rs);background:var(--accent2);
  color:#fff;font-size:15px;font-weight:600;text-align:center;transition:opacity .13s;margin-top:4px}
.btn-primary:active{opacity:.8}
.btn-ghost{width:100%;padding:13px;border-radius:var(--rs);background:var(--bg3);
  color:var(--text);font-size:14px;font-weight:500;text-align:center;
  border:1px solid var(--border2);transition:opacity .13s;margin-top:8px}
.btn-seg{flex:1;padding:9px;border-radius:8px;background:var(--bg3);color:var(--muted);font-size:13px;
  font-weight:500;text-align:center;transition:all .13s;border:1px solid var(--border)}
.btn-seg.active{background:rgba(91,138,240,.18);color:var(--accent);border-color:rgba(91,138,240,.35)}
.seg-row{display:flex;gap:8px;margin-bottom:12px}

/* Date picker quick options */
.date-quick{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.date-chip{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;
  background:var(--bg3);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .13s}
.date-chip.active,.date-chip:active{background:rgba(91,138,240,.18);color:var(--accent);border-color:rgba(91,138,240,.35)}

/* Today banner */
.today-banner{margin:0 14px 14px;background:linear-gradient(135deg,rgba(61,110,232,.22),rgba(38,198,184,.12));
  border:1px solid rgba(91,138,240,.22);border-radius:var(--r);padding:18px}
.today-date{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.3px}
.today-greeting{font-family:var(--serif);font-size:22px;margin-top:3px}
.today-sub{font-size:12px;color:var(--muted);margin-top:5px}

/* Journal */
.journal-entry{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);
  padding:14px;margin-bottom:8px;animation:fadeUp .2s ease}
.journal-time{font-size:11px;color:var(--muted);margin-bottom:5px}
.journal-text{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}

/* Account card */
.acc-card{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);
  padding:14px 16px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.acc-name{font-size:14px;font-weight:500}
.acc-type{font-size:11px;color:var(--muted);margin-top:2px}
.acc-bal{font-size:17px;font-weight:600;color:var(--green)}

/* Settings */
.settings-section{background:var(--card);border-radius:var(--r);border:1px solid var(--border);margin:0 14px 10px;overflow:hidden}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:14px;font-weight:500}
.settings-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:34px;margin-bottom:10px}
.empty-text{font-size:13px;line-height:1.6}

/* Toast */
#toast{position:fixed;top:calc(var(--safe-top) + 14px);left:50%;
  transform:translateX(-50%) translateY(-70px);
  background:var(--card2);border:1px solid var(--border2);border-radius:10px;
  padding:9px 16px;font-size:13px;font-weight:500;z-index:999;transition:transform .25s ease;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

/* Spinner */
.spinner{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:spin .65s linear infinite;margin:24px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* Cat item */
.cat-item{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.cat-item:last-child{border-bottom:none}
.cat-del{color:var(--red);font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
</style>
</head>
<body>
<div id="app">
  <div id="screens">

    <!-- TODAY -->
    <div class="screen active" id="screen-today">
      <div class="page-header"><h1>Today</h1><div class="sub" id="today-date-sub"></div></div>
      <div id="today-content"><div class="spinner"></div></div>
    </div>

    <!-- TASKS -->
    <div class="screen" id="screen-tasks">
      <div class="page-header"><h1>Tasks</h1></div>
      <div class="tabs" id="task-tabs">
        <button class="tab active" onclick="filterTasks('pending')">Pending</button>
        <button class="tab" onclick="filterTasks('today')">Due today</button>
        <button class="tab" onclick="filterTasks('week')">This week</button>
        <button class="tab" onclick="filterTasks('month')">This month</button>
        <button class="tab" onclick="filterTasks('someday')">Someday</button>
        <button class="tab" onclick="filterTasks('done')">Done</button>
      </div>
      <div id="tasks-progress"></div>
      <div id="tasks-content"><div class="spinner"></div></div>
    </div>

    <!-- GOALS -->
    <div class="screen" id="screen-goals">
      <div class="page-header"><h1>Goals</h1><div class="sub">Long-term projects</div></div>
      <div id="goals-content"><div class="spinner"></div></div>
    </div>

    <!-- FINANCE -->
    <div class="screen" id="screen-finance">
      <div class="page-header">
        <div class="header-row">
          <h1>Finance</h1>
          <div style="display:flex;gap:6px">
            <button class="tab active" id="fp-day"   onclick="setFinPeriod('day')">Day</button>
            <button class="tab"        id="fp-month" onclick="setFinPeriod('month')">Month</button>
            <button class="tab"        id="fp-year"  onclick="setFinPeriod('year')">Year</button>
            <button class="tab"        id="fp-all"   onclick="setFinPeriod('all')">All</button>
          </div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="finTab('overview')">Overview</button>
        <button class="tab" onclick="finTab('transactions')">Transactions</button>
        <button class="tab" onclick="finTab('accounts')">Accounts</button>
        <button class="tab" onclick="finTab('stocks')">Stocks</button>
        <button class="tab" onclick="finTab('mf')">Mutual funds</button>
      </div>
      <div id="finance-content"><div class="spinner"></div></div>
    </div>

    <!-- JOURNAL -->
    <div class="screen" id="screen-journal">
      <div class="page-header">
        <div class="header-row">
          <div><h1>Journal</h1><div class="sub">Thoughts, ideas, notes</div></div>
          <button onclick="openAddJournal()" style="width:36px;height:36px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center">
            <svg width="16" height="16" viewBox="0 0 24 24" stroke="#fff" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>
      <div class="search-bar">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search journal..." oninput="searchJournal(this.value)"/>
      </div>
      <div id="journal-content"><div class="spinner"></div></div>
    </div>

    <!-- MORE / SETTINGS -->
    <div class="screen" id="screen-more">
      <div class="page-header"><h1>Settings</h1></div>
      <div id="more-content"></div>
    </div>

  </div>

  <nav id="nav">
    <button class="nav-btn active" onclick="goto('today')" id="nav-today">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Today
    </button>
    <button class="nav-btn" onclick="goto('tasks')" id="nav-tasks">
      <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Tasks
    </button>
    <button class="nav-btn" onclick="goto('goals')" id="nav-goals">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Goals
    </button>
    <button class="nav-btn" onclick="goto('finance')" id="nav-finance">
      <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 1 0 0 7h5a3.5 3.5 0 1 1 0 7H6"/></svg>Finance
    </button>
    <button class="nav-btn" onclick="goto('journal')" id="nav-journal">
      <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Journal
    </button>
    <button class="nav-btn" onclick="goto('more')" id="nav-more">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>More
    </button>
  </nav>
</div>

<button id="fab" onclick="openAddSheet()">
  <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<div id="sheet-overlay" onclick="closeSheet()"></div>
<div id="bottom-sheet"><div class="sheet-handle"></div><div id="sheet-inner"></div></div>
<div id="toast"></div>

<script>
// ─── CONFIG & STATE ───────────────────────────────────────────
const CFG = {
  scriptUrl: localStorage.getItem('scriptUrl')||'',
  vapidKey:  localStorage.getItem('vapidKey')||'',
};
const S = {
  screen:'today', tasks:[], goals:[], finPeriod:'day', finTab:'overview',
  taskFilter:'pending', categories:{Income:[],Expense:[]}, accounts:[],
  stocks:[], mf:[], finance:null
};

// ─── NSE/BSE STOCK LIST (common tickers) ─────────────────────
const STOCK_LIST = [
  'RELIANCE','TCS','HDFCBANK','INFY','ICICIBANK','HINDUNILVR','SBIN','BAJFINANCE',
  'BHARTIARTL','KOTAKBANK','LT','ASIANPAINT','MARUTI','AXISBANK','SUNPHARMA',
  'TITAN','ULTRACEMCO','NESTLEIND','WIPRO','ONGC','NTPC','POWERGRID','ADANIPORTS',

// ─── API ─────────────────────────────────────────────────────
async function api(action, params={}) {
  if (!CFG.scriptUrl) { showToast('⚙️ Set Script URL in Settings'); return null; }
  try {
    const url = CFG.scriptUrl + '?action=' + action + '&' + new URLSearchParams(params);
    const r = await fetch(url);
    return await r.json();
  } catch(e) { showToast('Connection error'); return null; }
}
async function apiPost(action, data={}) {
  if (!CFG.scriptUrl) { showToast('⚙️ Set Script URL in Settings'); return null; }
  try {
    const r = await fetch(CFG.scriptUrl, { method:'POST', body:JSON.stringify({action,data}) });
    return await r.json();
  } catch(e) { showToast('Connection error'); return null; }
}

// ─── NAV ─────────────────────────────────────────────────────
function goto(screen) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+screen).classList.add('active');
  document.getElementById('nav-'+screen).classList.add('active');
  S.screen = screen;
  if (screen==='today')   loadToday();
  if (screen==='tasks')   loadTasks();
  if (screen==='goals')   loadGoals();
  if (screen==='finance') loadFinance();
  if (screen==='journal') loadJournal();
  if (screen==='more')    renderSettings();
}

// ─── TODAY ───────────────────────────────────────────────────

// ─── TASKS ───────────────────────────────────────────────────
async function loadTasks() {
  const data = await api('getTasks');
  if (!data) return;
  S.tasks = Array.isArray(data)?data:[];
  renderTasks();
}

function filterTasks(f) {
  S.taskFilter = f;
  document.querySelectorAll('#task-tabs .tab').forEach((t,i)=>{
    t.classList.toggle('active',['pending','today','week','month','someday','done'][i]===f);
  });
  renderTasks();
}

function renderTasks() {
  const now   = new Date();
  const today = now.toISOString().slice(0,10);
  const weekEnd = new Date(now); weekEnd.setDate(now.getDate()+7);
  const wStr  = weekEnd.toISOString().slice(0,10);
  const monthEnd = new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().slice(0,10);
  let list = S.tasks;
  if (S.taskFilter==='pending') list = list.filter(t=>t.Status!=='Done'&&t.DueDate!=='someday');
  if (S.taskFilter==='today')   list = list.filter(t=>t.Status!=='Done'&&String(t.DueDate).slice(0,10)===today);
  if (S.taskFilter==='week')    list = list.filter(t=>t.Status!=='Done'&&t.DueDate&&String(t.DueDate).slice(0,10)<=wStr);
  if (S.taskFilter==='month')   list = list.filter(t=>t.Status!=='Done'&&t.DueDate&&String(t.DueDate).slice(0,10)<=monthEnd);
  if (S.taskFilter==='someday') list = list.filter(t=>t.Status!=='Done'&&(t.DueDate==='someday'||!t.DueDate));
  if (S.taskFilter==='done')    list = list.filter(t=>t.Status==='Done');

  const done  = S.tasks.filter(t=>t.Status==='Done').length;
  const total = S.tasks.length;
  const pct   = total ? Math.round(done/total*100) : 0;
  const emoji = pct>=80?'🏆':pct>=50?'💪':pct>=20?'🙂':'😴';

  const prog = total ? `
    <div style="display:flex;align-items:center;gap:14px;padding:0 14px;margin-bottom:10px">
      <div style="position:relative;width:70px;height:70px;flex-shrink:0">
        <svg width="70" height="70" viewBox="0 0 70 70">
          <circle cx="35" cy="35" r="28" fill="none" stroke="var(--bg3)" stroke-width="6"/>
          <circle cx="35" cy="35" r="28" fill="none" stroke="var(--accent)" stroke-width="6"
            stroke-dasharray="${2*Math.PI*28}" stroke-dashoffset="${2*Math.PI*28*(1-pct/100)}"
            stroke-linecap="round" transform="rotate(-90 35 35)"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--accent)">${pct}%</div>
      </div>
      <div>
        <div style="font-size:22px">${emoji}</div>
        <div style="font-size:13px;font-weight:500;margin-top:2px">${done} of ${total} tasks done</div>
        <div style="font-size:11px;color:var(--muted)">${list.length} in this view</div>
      </div>
    </div>` : '';

  document.getElementById('tasks-progress').innerHTML = prog;
  document.getElementById('tasks-content').innerHTML = list.length
    ? `<div class="task-list">${list.map(t=>taskItem(t)).join('')}</div>`
    : `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No tasks here. Tap + to add one.</div></div>`;
}

function taskItem(t, compact) {
  const done = t.Status==='Done';
  const prio = Math.min(5,Math.max(1,Number(t.Priority)||3));
  const due  = t.DueDate && t.DueDate!=='someday' ? 'Due '+formatDate(t.DueDate) : t.DueDate==='someday'?'Someday':'';
  return `<div class="task-item${done?' done':''}" id="ti-${t.ID}">
    <div class="check-btn${done?' chk':''}" onclick="toggleTask('${t.ID}','${done?'Pending':'Done'}')">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="task-body">
      <div class="task-title">${esc(t.Title||'')}</div>
      ${due?`<div class="task-meta">${due}${t.GoalID?' · <span class="badge badge-goal">Goal</span>':''}</div>`:''}
    </div>
    <div class="prio-dot p${prio}"></div>
  </div>`;
}

async function toggleTask(id, newStatus) {
  const el = document.getElementById('ti-'+id);
  if (el) el.style.opacity='.4';
  const res = await apiPost('updateTask',{id,Status:newStatus});
  if (res?.ok) {
    const t = S.tasks.find(x=>x.ID===id);
    if (t) t.Status = newStatus;
    showToast(newStatus==='Done'?'✅ Done!':'↩️ Reopened');
    renderTasks();
    if (S.screen==='today') loadToday();
  }
}

function renderFinMF() {
  const total   = S.mf.reduce((s,m)=>s+Number(m.Units)*Number(m.CurrentNAV||m.BuyNAV),0);

  document.getElementById('finance-content').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Current value</div><div class="stat-val ac">₹${fmt(total)}</div></div>

        const cur = Number(m.Units)*(Number(m.CurrentNAV)||Number(m.BuyNAV));

        const mpl = cur-inv;
        return `<div class="stock-row">
          <div style="display:flex;justify-content:space-between">
            <div class="stock-ticker" style="font-size:13px;max-width:60%">${esc(m.Name)}</div>

  document.querySelectorAll('.date-chip').forEach(c=>c.classList.remove('active'));

  const title = document.getElementById('inp-title').value.trim();

  const duePick = document.getElementById('inp-due').value;
  const due = duePick || _dueDate;
  const res = await apiPost('addTask',{
    title, priority:document.getElementById('inp-prio').value,
    dueDate:due, notes:document.getElementById('inp-notes').value,
    type:goalId?'subtask':'simple', goalId:goalId||''

  if (res?.ok) {

function filterStockSuggestions(q) {
  const box = document.getElementById('stock-suggestions');
  if (!q||q.length<1) { box.style.display='none'; return; }
  const matches = STOCK_LIST.filter(s=>s.includes(q.toUpperCase())).slice(0,8);
  if (!matches.length&&q.length>2) matches.push(q.toUpperCase()+' (custom)');
  box.style.display = matches.length?'block':'none';
  box.innerHTML = matches.map(s=>`
    <div onclick="selectStock('${s.replace(' (custom)','')}')"
      style="padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)"
      onmouseover="this.style.background='var(--card2)'" onmouseout="this.style.background=''">${s}</div>`).join('');
}

  document.getElementById('inp-stock-search').value = ticker;

      <div id="cat-list-inc" style="display:none">
        ${renderCatList('Income')}
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <input type="text" id="inp-new-cat" placeholder="New category name..." style="flex:1"/>
        <button onclick="addCategory()" style="padding:11px 14px;border-radius:8px;background:var(--accent2);color:#fff;font-size:13px;font-weight:600">Add</button>
      </div>`;
  }
  document.getElementById('sheet-inner').innerHTML = renderCats();
  openSheet();
}

let _catTab = 'Expense';
function catEditorTab(type,btn) {
  _catTab = type;
  document.querySelectorAll('#bottom-sheet .btn-seg').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('cat-list-exp').style.display=type==='Expense'?'block':'none';
  document.getElementById('cat-list-inc').style.display=type==='Income'?'block':'none';
}

function renderCatList(type) {
  const cats = S.categories[type]||[];
  return `<div style="background:var(--bg3);border-radius:8px;border:1px solid var(--border);overflow:hidden;max-height:200px;overflow-y:auto">
    ${cats.map(c=>`<div class="cat-item"><span>${esc(c)}</span>
      <span class="cat-del" onclick="deleteCategory('${type}','${esc(c)}')">×</span>
    </div>`).join('')||'<div class="cat-item" style="color:var(--muted)">No categories yet</div>'}
  </div>`;
}

async function addCategory() {
  const name = document.getElementById('inp-new-cat').value.trim();
  if (!name) return;
  const res = await apiPost('saveCategory',{type:_catTab,name});
  if (res?.ok) {
    if (!S.categories[_catTab]) S.categories[_catTab]=[];
    S.categories[_catTab].push(name);
    document.getElementById('inp-new-cat').value='';
    document.getElementById(_catTab==='Expense'?'cat-list-exp':'cat-list-inc').innerHTML=renderCatList(_catTab);
    showToast('✅ Category added!');
  } else showToast(res?.error||'Already exists');
}

async function deleteCategory(type,name) {
  const res = await apiPost('deleteCategory',{type,name});
  if (res?.ok) {
    S.categories[type]=(S.categories[type]||[]).filter(c=>c!==name);
    document.getElementById(type==='Expense'?'cat-list-exp':'cat-list-inc').innerHTML=renderCatList(type);
    showToast('🗑️ Removed');
  }
}

// ─── ACCOUNT EDITOR ──────────────────────────────────────────
async function openAccountEditor() {
  const accounts = await api('getAccounts')||[];
  S.accounts = accounts;
  document.getElementById('sheet-inner').innerHTML = `
    <div class="sheet-title">Manage accounts</div>
    <div style="max-height:240px;overflow-y:auto;margin-bottom:12px">
      ${accounts.map(a=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 14px;
          background:var(--bg3);border-radius:8px;margin-bottom:6px">
          <div><div style="font-size:13px;font-weight:500">${esc(a.Name)}</div>
            <div style="font-size:11px;color:var(--muted)">${a.Type}</div></div>
          <input type="number" value="${Number(a.Balance||0)}" style="width:100px;text-align:right;font-size:14px;font-weight:600;color:var(--green)"
            onchange="updateAccBalance('${a.ID}',this.value)"/>
        </div>`).join('')}
    </div>
    <button class="btn-ghost" onclick="openAddAccount()">+ Add new account</button>`;
  openSheet();
}

function openAddAccount() {
  document.getElementById('sheet-inner').innerHTML = `
    <div class="sheet-title">Add account</div>
    <div class="form-row"><label>Account name</label><input type="text" id="inp-acc-name" placeholder="e.g. SBI Savings"/></div>
    <div class="form-row"><label>Type</label>
      <select id="inp-acc-type">
        <option value="Bank">Bank</option><option value="Trading">Trading</option>
        <option value="Cash">Cash</option><option value="MutualFund">Mutual Fund</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-row"><label>Opening balance (₹)</label><input type="number" id="inp-acc-bal" placeholder="0" inputmode="decimal"/></div>
    <button class="btn-primary" onclick="submitAddAccount()">Add account</button>`;
  openSheet();
}

async function updateAccBalance(id,bal) {
  await apiPost('updateAccount',{id,balance:Number(bal)});
  const a = S.accounts.find(x=>x.ID===id);
  if (a) a.Balance = Number(bal);
}

async function submitAddAccount() {
  const name = document.getElementById('inp-acc-name').value.trim();
  if (!name) { showToast('Enter account name'); return; }
  const res = await apiPost('saveAccount',{
    name, type:document.getElementById('inp-acc-type').value,
    balance:Number(document.getElementById('inp-acc-bal').value)||0
  });
  if (res?.ok) { closeSheet(); showToast('✅ Account added!'); }
}

// ─── PUSH ────────────────────────────────────────────────────
async function requestPush() {
  if (!('serviceWorker' in navigator)||!('PushManager' in window)) { showToast('Push not supported'); return; }
  const perm = await Notification.requestPermission();
  if (perm!=='granted') { showToast('Permission denied'); return; }
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:CFG.vapidKey||undefined });
    await apiPost('registerToken',{token:JSON.stringify(sub)});
    showToast('🔔 Push enabled!');
  } catch(e) { showToast('Push setup failed'); }
}

// ─── UTILITIES ───────────────────────────────────────────────
function isoToday()    { return new Date().toISOString().slice(0,10); }
function isoTomorrow() { const d=new Date(); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); }
function isoWeekEnd()  { const d=new Date(); d.setDate(d.getDate()+7); return d.toISOString().slice(0,10); }
function isoMonthEnd() { const d=new Date(); return new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().slice(0,10); }
function isoYearEnd()  { return new Date().getFullYear()+'-12-31'; }

function fmt(n) { return Number(n||0).toLocaleString('en-IN'); }
function formatDate(d) {
  if (!d||d==='someday') return 'Someday';
  try { return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }
  catch(e) { return String(d); }
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function configPrompt() {
  return `<div class="empty" style="padding:60px 30px">
    <div class="empty-icon">⚙️</div>
    <div class="empty-text">Set your Apps Script URL in Settings to get started.</div>
    <button class="btn-primary" onclick="goto('more')" style="margin-top:16px;max-width:180px;margin-left:auto;margin-right:auto">Go to Settings</button>
  </div>`;
}

async function ensureCategories() {
  if (!S.categories.Income.length&&!S.categories.Expense.length) {
    const c = await api('getCategories');
    if (c) S.categories = c;
  }
}

// ─── SHEET OPEN/CLOSE ────────────────────────────────────────
function openSheet() {
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('bottom-sheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('bottom-sheet').classList.remove('open');
}

// ─── TOAST ───────────────────────────────────────────────────
let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(()=>t.classList.remove('show'),2600);
}

// ─── SERVICE WORKER ──────────────────────────────────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

// ─── BOOT ────────────────────────────────────────────────────
loadToday();
</script>
