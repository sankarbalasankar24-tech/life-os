<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0d0f18"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Life OS</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0f18;--bg2:#141720;--bg3:#1a1e2e;--card:#1c2030;--card2:#222840;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#eef0f8;--muted:#8890b0;--faint:#404568;
  --accent:#5b8af0;--accent2:#3d6ee8;
  --green:#2ecc8a;--amber:#f5a623;--red:#f0605a;--orange:#f97316;--purple:#9b72f0;--teal:#26c6b8;
  --font:'DM Sans',sans-serif;--serif:'DM Serif Display',serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  --nav:62px;--r:14px;--rs:9px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:var(--font);color:var(--text);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);padding:11px 14px;font-size:14px;width:100%;outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
select option{background:var(--bg2)}
textarea{resize:none;line-height:1.6}
::-webkit-scrollbar{width:0;height:0}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
#screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav) + var(--safe-bot) + 16px);display:none;animation:fadeUp .2s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page-header{padding:18px 18px 6px;position:sticky;top:0;z-index:10;background:var(--bg)}
.page-header h1{font-family:var(--serif);font-size:25px;font-weight:400}
.page-header .sub{color:var(--muted);font-size:12px;margin-top:2px}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
#nav{height:calc(var(--nav) + var(--safe-bot));padding-bottom:var(--safe-bot);display:flex;background:rgba(13,15,24,.94);backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:100;flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--faint);font-size:9px;letter-spacing:.4px;text-transform:uppercase;font-weight:500;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin:0 14px 10px}
.card-sm{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:12px 14px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 14px 10px}
.stat-card{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:14px}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:500;margin-bottom:3px}
.stat-val{font-size:22px;font-weight:600;line-height:1}
.g{color:var(--green)}.r{color:var(--red)}.ac{color:var(--accent)}.pu{color:var(--purple)}.or{color:var(--orange)}.am{color:var(--amber)}
.sec-title{padding:14px 18px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600}
.tabs{display:flex;gap:6px;padding:6px 14px 12px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;background:var(--card);border:1px solid var(--border);color:var(--muted);white-space:nowrap;transition:all .15s}
.tab.active{background:rgba(91,138,240,.18);color:var(--accent);border-color:rgba(91,138,240,.35)}
/* Tasks */
.task-list{display:flex;flex-direction:column;gap:7px;padding:0 14px}
.task-item{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);display:flex;align-items:flex-start;gap:11px;padding:12px 14px;transition:opacity .3s;animation:fadeUp .2s ease}
.task-item.done{opacity:.35}
.task-item.done .task-title{text-decoration:line-through}
.task-item.ov1{border-left:3px solid var(--amber)}
.task-item.ov3{border-left:3px solid var(--orange)}
.task-item.ov7{border-left:3px solid var(--red);background:rgba(240,96,90,.06)}
.ob{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;display:inline-block;margin-bottom:3px}
.ob1{background:rgba(245,166,35,.15);color:var(--amber)}
.ob3{background:rgba(249,115,22,.15);color:var(--orange)}
.ob7{background:rgba(240,96,90,.18);color:var(--red)}
.check-btn{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;margin-top:2px}
.check-btn.chk{background:var(--green);border-color:var(--green)}
.check-btn svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .12s}
.check-btn.chk svg{opacity:1}
.task-body{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{font-size:11px;color:var(--muted);margin-top:2px}
.prio-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.p1{background:var(--red)}.p2{background:var(--orange)}.p3{background:var(--amber)}.p4{background:var(--accent)}.p5{background:var(--faint)}
.prog-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent2),var(--teal));transition:width .5s ease}
/* Goals */
.goal-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin:0 14px 10px;animation:fadeUp .2s ease}
.subtask-list{margin-top:12px;display:flex;flex-direction:column;gap:5px}
.subtask-item{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--bg3);border-radius:8px;font-size:13px}
.subtask-item.done{opacity:.4}.subtask-item.done span{text-decoration:line-through}
/* Finance */
.fin-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.fin-row:last-child{border-bottom:none}
.fin-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.fin-body{flex:1;min-width:0}
.fin-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fin-cat{font-size:11px;color:var(--muted);margin-top:1px}
.fin-amt{font-size:14px;font-weight:600;white-space:nowrap}
.inc{color:var(--green)}.exp{color:var(--red)}
/* Stock P&L cards */
.pl-row{display:flex;gap:8px;padding:0 14px;margin-bottom:10px}
.pl-card{border-radius:var(--rs);border:1px solid var(--border);padding:12px;flex:1;text-align:center}
.pl-profit{background:rgba(46,204,138,.08);border-color:rgba(46,204,138,.22)}
.pl-loss{background:rgba(240,96,90,.08);border-color:rgba(240,96,90,.22)}
.pl-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.pl-val{font-size:17px;font-weight:700}
/* Stocks */
.stock-row{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:14px;margin-bottom:8px}
.stock-detail{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.stock-detail-item{font-size:11px;color:var(--muted)}
.stock-detail-item span{color:var(--text);font-weight:500}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500}
.bg{background:rgba(46,204,138,.12);color:var(--green);border:1px solid rgba(46,204,138,.2)}
.ba{background:rgba(245,166,35,.12);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.bl{background:rgba(91,138,240,.15);color:var(--accent);border:1px solid rgba(91,138,240,.25)}
/* Overdue strip */
.ov-strip{margin:0 14px 10px;background:rgba(240,96,90,.09);border:1px solid rgba(240,96,90,.22);border-radius:var(--rs);padding:10px 14px}
.ov-title{font-size:12px;font-weight:600;color:var(--red);margin-bottom:4px}
.ov-item{font-size:12px;color:var(--muted);padding:2px 0}
/* Today banner */
.today-banner{margin:0 14px 14px;background:linear-gradient(135deg,rgba(61,110,232,.22),rgba(38,198,184,.12));border:1px solid rgba(91,138,240,.22);border-radius:var(--r);padding:18px}
.today-greeting{font-family:var(--serif);font-size:22px;margin-top:3px}
/* Accounts */
.acc-card{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:14px 16px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
/* Journal */
.journal-entry{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:14px;margin-bottom:8px}
.journal-time{font-size:11px;color:var(--muted);margin-bottom:5px}
.journal-text{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
/* Settings */
.settings-section{background:var(--card);border-radius:var(--r);border:1px solid var(--border);margin:0 14px 10px;overflow:hidden}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:14px;font-weight:500}
.settings-sub{font-size:11px;color:var(--muted);margin-top:2px}
/* FAB */
#fab{position:fixed;bottom:calc(var(--nav) + var(--safe-bot) + 14px);right:17px;width:50px;height:50px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center;z-index:200;box-shadow:0 4px 20px rgba(61,110,232,.4);transition:transform .13s}
#fab:active{transform:scale(.9)}
#fab svg{width:21px;height:21px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* Search bar */
.search-bar{display:flex;align-items:center;gap:10px;margin:0 14px 10px;background:var(--card);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 14px}
.search-bar svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.search-bar input{background:none;border:none;outline:none;font-size:14px;flex:1;padding:0;color:var(--text)}
/* Bottom sheet */
#sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(3px)}
#sheet-overlay.open{opacity:1;pointer-events:auto}
#bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:18px 18px 0 0;z-index:400;padding:10px 18px 18px;padding-bottom:calc(18px + var(--safe-bot));max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1)}
#bottom-sheet.open{transform:translateY(0)}
.sheet-handle{width:34px;height:4px;background:var(--faint);border-radius:2px;margin:0 auto 16px}
.sheet-title{font-size:16px;font-weight:600;margin-bottom:16px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.btn-primary{width:100%;padding:14px;border-radius:var(--rs);background:var(--accent2);color:#fff;font-size:15px;font-weight:600;text-align:center;transition:opacity .13s;margin-top:4px}
.btn-primary:active{opacity:.8}
.btn-ghost{width:100%;padding:13px;border-radius:var(--rs);background:var(--bg3);color:var(--text);font-size:14px;font-weight:500;text-align:center;border:1px solid var(--border2);margin-top:8px}
.btn-seg{flex:1;padding:9px;border-radius:8px;background:var(--bg3);color:var(--muted);font-size:13px;font-weight:500;text-align:center;transition:all .13s;border:1px solid var(--border)}
.btn-seg.active{background:rgba(91,138,240,.18);color:var(--accent);border-color:rgba(91,138,240,.35)}
.seg-row{display:flex;gap:8px;margin-bottom:12px}
.date-quick{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.date-chip{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;background:var(--bg3);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .13s}
.date-chip.sel{background:rgba(91,138,240,.18);color:var(--accent);border-color:rgba(91,138,240,.35)}
/* Cat editor */
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.cat-item:last-child{border-bottom:none}
/* Toast */
#toast{position:fixed;top:calc(var(--safe-top)+14px);left:50%;transform:translateX(-50%) translateY(-70px);background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:9px 16px;font-size:13px;font-weight:500;z-index:999;transition:transform .25s ease;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
.spinner{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;margin:24px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:34px;margin-bottom:10px}
.empty-text{font-size:13px;line-height:1.6}
</style>
</head>
<body>
<div id="app">
  <div id="screens">
    <div class="screen active" id="screen-today">
      <div class="page-header"><h1>Today</h1><div class="sub" id="today-sub"></div></div>
      <div id="today-content"><div class="spinner"></div></div>
    </div>
    <div class="screen" id="screen-tasks">
      <div class="page-header"><h1>Tasks</h1></div>
      <div class="tabs" id="task-tabs">
        <button class="tab active" onclick="filterTasks('pending')">Pending</button>
        <button class="tab" onclick="filterTasks('overdue')">🔥 Overdue</button>
        <button class="tab" onclick="filterTasks('today')">Today</button>
        <button class="tab" onclick="filterTasks('week')">This week</button>
        <button class="tab" onclick="filterTasks('month')">This month</button>
        <button class="tab" onclick="filterTasks('someday')">Someday</button>
        <button class="tab" onclick="filterTasks('done')">Done</button>
      </div>
      <div id="tasks-progress"></div>
      <div id="tasks-content"><div class="spinner"></div></div>
    </div>
    <div class="screen" id="screen-goals">
      <div class="page-header"><h1>Goals</h1><div class="sub">Long-term projects</div></div>
      <div id="goals-content"><div class="spinner"></div></div>
    </div>
    <div class="screen" id="screen-finance">
      <div class="page-header">
        <div class="header-row">
          <h1>Finance</h1>
          <div style="display:flex;gap:4px">
            <button class="tab active" id="fp-day" onclick="setFinPeriod('day')">Day</button>
            <button class="tab" id="fp-week" onclick="setFinPeriod('week')">Week</button>
            <button class="tab" id="fp-month" onclick="setFinPeriod('month')">Month</button>
            <button class="tab" id="fp-year" onclick="setFinPeriod('year')">Year</button>
            <button class="tab" id="fp-all" onclick="setFinPeriod('all')">All</button>
          </div>
        </div>
      </div>
      <div class="tabs" id="fin-tabs">
        <button class="tab active" onclick="finTab('overview')">Overview</button>
        <button class="tab" onclick="finTab('transactions')">Transactions</button>
        <button class="tab" onclick="finTab('accounts')">Accounts</button>
        <button class="tab" onclick="finTab('stocks')">Stocks</button>
        <button class="tab" onclick="finTab('mf')">Mutual funds</button>
      </div>
      <div id="finance-content"><div class="spinner"></div></div>
    </div>
    <div class="screen" id="screen-journal">
      <div class="page-header">
        <div class="header-row">
          <div><h1>Journal</h1><div class="sub">Thoughts &amp; ideas</div></div>
          <button onclick="openAddJournal()" style="width:36px;height:36px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center">
            <svg width="16" height="16" viewBox="0 0 24 24" stroke="#fff" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>
      <div class="search-bar"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search journal..." oninput="searchJournal(this.value)"/></div>
      <div id="journal-content"><div class="spinner"></div></div>
    </div>
    <div class="screen" id="screen-more">
      <div class="page-header"><h1>Settings</h1></div>
      <div id="more-content"></div>
    </div>
  </div>
  <nav id="nav">
    <button class="nav-btn active" onclick="goto('today')" id="nav-today">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Today
    </button>
    <button class="nav-btn" onclick="goto('tasks')" id="nav-tasks">
      <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Tasks
    </button>
    <button class="nav-btn" onclick="goto('goals')" id="nav-goals">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Goals
    </button>
    <button class="nav-btn" onclick="goto('finance')" id="nav-finance">
      <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 1 0 0 7h5a3.5 3.5 0 1 1 0 7H6"/></svg>Finance
    </button>
    <button class="nav-btn" onclick="goto('journal')" id="nav-journal">
      <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Journal
    </button>
    <button class="nav-btn" onclick="goto('more')" id="nav-more">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>More
    </button>
  </nav>
</div>
<button id="fab" onclick="openAddSheet()">
  <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>
<div id="sheet-overlay" onclick="closeSheet()"></div>
<div id="bottom-sheet"><div class="sheet-handle"></div><div id="sheet-inner"></div></div>
<div id="toast"></div>
<script>
// ── CONFIG & STATE ────────────────────────────────────────────
const CFG={scriptUrl:localStorage.getItem('scriptUrl')||'',vapidKey:localStorage.getItem('vapidKey')||''};
const S={screen:'today',tasks:[],goals:[],finPeriod:'day',finTab:'overview',
  taskFilter:'pending',categories:{Income:[],Expense:[]},accounts:[],stocks:[],mf:[],finance:null};

const STOCK_LIST=['RELIANCE','TCS','HDFCBANK','INFY','ICICIBANK','HINDUNILVR','SBIN','BAJFINANCE',
  'BHARTIARTL','KOTAKBANK','LT','ASIANPAINT','MARUTI','AXISBANK','SUNPHARMA','TITAN',
  'ULTRACEMCO','NESTLEIND','WIPRO','ONGC','NTPC','POWERGRID','ADANIPORTS','TATAMOTORS',
  'TECHM','HCLTECH','DIVISLAB','DRREDDY','CIPLA','EICHERMOT','GRASIM','JSWSTEEL',
  'TATASTEEL','HINDALCO','COALINDIA','BPCL','IOC','HEROMOTOCO','BAJAJFINSV','BRITANNIA',
  'SHREECEM','HDFCLIFE','SBILIFE','INDUSINDBK','BAJAJ-AUTO','APOLLOHOSP','TATACONSUM',
  'LTIM','ADANIENT','IRCTC','IREDA','IRFC','RVNL','NHPC','SJVN','RECLTD','PFC',
  'ZOMATO','NYKAA','PAYTM','DELHIVERY','VEDL','NMDC','SAIL','HINDZINC','MUTHOOTFIN',

// ── OVERDUE ENGINE ────────────────────────────────────────────
function daysOverdue(t){
  if(t.Status==='Done'||!t.DueDate||t.DueDate==='someday')return 0;
  const due=new Date(t.DueDate),now=new Date();
  now.setHours(0,0,0,0);
  const d=Math.floor((now-due)/86400000);
  return d>0?d:0;
}
function effPrio(t){
  const d=daysOverdue(t),p=Number(t.Priority)||3;
  if(d>=7)return 1;
  if(d>=3)return Math.min(p,2);
  if(d>=1)return Math.min(p,3);
  return p;
}
function ovClass(d){return d>=7?'ov7':d>=3?'ov3':d>=1?'ov1':'';}
function ovLabel(d){
  if(d>=7)return'<span class="ob ob7">🔥 '+d+'d overdue — urgent!</span>';
  if(d>=3)return'<span class="ob ob3">⚠️ '+d+'d overdue</span>';
  if(d>=1)return'<span class="ob ob1">⏰ '+d+'d overdue</span>';
  return'';
}

// ── PIE CHART ─────────────────────────────────────────────────
function buildPie(data,r,cx,cy){
  cx=cx||r+4;cy=cy||r+4;
  const tot=data.reduce((s,d)=>s+d.v,0);
  if(!tot)return{svg:'',legend:[],dim:0};
  let ang=-Math.PI/2,svg='';const legend=[];
  data.forEach((d,i)=>{
    const sl=(d.v/tot)*2*Math.PI;
    const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang);
    ang+=sl;
    const x2=cx+r*Math.cos(ang),y2=cy+r*Math.sin(ang);
    const lg=sl>Math.PI?1:0,c=PIE_COLORS[i%PIE_COLORS.length];
    svg+='<path d="M'+cx+','+cy+' L'+x1.toFixed(1)+','+y1.toFixed(1)+
      ' A'+r+','+r+' 0 '+lg+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+' Z"'+
      ' fill="'+c+'" stroke="var(--bg)" stroke-width="1.5"/>';
    legend.push({label:d.k,v:d.v,color:c,pct:Math.round(d.v/tot*100)});
  });
  const hole=Math.round(r*0.52);
  svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+hole+'" fill="var(--card)"/>';
  return{svg,legend,dim:(r+4)*2};
}

function renderPie(elId,data){
  const el=document.getElementById(elId);if(!el)return;
  const tot=data.reduce((s,d)=>s+d.v,0);
  if(!tot){el.innerHTML='<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">No data for this period</div>';return;}
  const{svg,legend,dim}=buildPie(data,68,72,72);
  const size=144;
  el.innerHTML='<div style="display:flex;gap:14px;align-items:center">'+
    '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" style="flex-shrink:0">'+svg+'</svg>'+
    '<div style="flex:1">'+
    legend.map(l=>'<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">'+
      '<div style="width:8px;height:8px;border-radius:50%;background:'+l.color+';flex-shrink:0"></div>'+
      '<div style="flex:1;font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(l.label)+'</div>'+
      '<div style="font-size:11px;font-weight:600;white-space:nowrap">&#8377;'+fmt(l.v)+
      ' <span style="color:var(--muted);font-weight:400">'+l.pct+'%</span></div></div>').join('')+
    '<div style="border-top:1px solid var(--border);padding-top:6px;margin-top:2px;font-size:11px;font-weight:600">Total: &#8377;'+fmt(tot)+'</div>'+
    '</div></div>';
}

async function loadTasks(){
  const d=await api('getTasks');
  if(!d)return;
  S.tasks=Array.isArray(d)?d:[];
  renderTasks();
}
function filterTasks(f){
  S.taskFilter=f;
  const L=['pending','overdue','today','week','month','someday','done'];
  document.querySelectorAll('#task-tabs .tab').forEach((t,i)=>t.classList.toggle('active',L[i]===f));
  renderTasks();
}
function renderTasks(){
  const ts=isoToday(),ws=isoAdd(7),ms=isoMonthEnd();
  let list=S.tasks;
  if(S.taskFilter==='pending')list=list.filter(t=>t.Status!=='Done'&&t.DueDate!=='someday');
  if(S.taskFilter==='overdue')list=list.filter(t=>t.Status!=='Done'&&daysOverdue(t)>0);
  if(S.taskFilter==='today')list=list.filter(t=>t.Status!=='Done'&&String(t.DueDate).slice(0,10)===ts);
  if(S.taskFilter==='week')list=list.filter(t=>t.Status!=='Done'&&t.DueDate&&t.DueDate<=ws);
  if(S.taskFilter==='month')list=list.filter(t=>t.Status!=='Done'&&t.DueDate&&t.DueDate<=ms);
  if(S.taskFilter==='someday')list=list.filter(t=>t.Status!=='Done'&&(!t.DueDate||t.DueDate==='someday'));
  if(S.taskFilter==='done')list=list.filter(t=>t.Status==='Done');
  if(S.taskFilter!=='done')list=list.slice().sort((a,b)=>effPrio(a)-effPrio(b));
  const done=S.tasks.filter(t=>t.Status==='Done').length,total=S.tasks.length;
  const pct=total?Math.round(done/total*100):0;
  const emoji=pct>=80?'🏆':pct>=50?'💪':pct>=20?'🙂':'😴';
  const oc=S.tasks.filter(t=>t.Status!=='Done'&&daysOverdue(t)>0).length;
  document.getElementById('tasks-progress').innerHTML=total?
    '<div style="display:flex;align-items:center;gap:14px;padding:0 14px;margin-bottom:10px">'+
    '<div style="position:relative;width:68px;height:68px;flex-shrink:0">'+
    '<svg width="68" height="68" viewBox="0 0 68 68">'+
    '<circle cx="34" cy="34" r="28" fill="none" stroke="var(--bg3)" stroke-width="6"/>'+
    '<circle cx="34" cy="34" r="28" fill="none" stroke="var(--accent)" stroke-width="6"'+
    ' stroke-dasharray="'+(2*Math.PI*28).toFixed(1)+'"'+
    ' stroke-dashoffset="'+(2*Math.PI*28*(1-pct/100)).toFixed(1)+'"'+
    ' stroke-linecap="round" transform="rotate(-90 34 34)"/></svg>'+
    '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent)">'+pct+'%</div>'+
    '</div>'+
    '<div><div style="font-size:22px">'+emoji+'</div>'+
    '<div style="font-size:13px;font-weight:500;margin-top:2px">'+done+'/'+total+' done</div>'+
    (oc?'<div style="font-size:11px;color:var(--red);margin-top:2px">🔥 '+oc+' overdue</div>':'')+
    '</div></div>':'';
  document.getElementById('tasks-content').innerHTML=list.length?
    '<div class="task-list">'+list.map(t=>taskItem(t)).join('')+'</div>':
    '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">'+(S.taskFilter==='overdue'?'No overdue tasks! 🎉':'No tasks here. Tap + to add.')+'</div></div>';
}
function taskItem(t,compact){
  const done=t.Status==='Done',days=done?0:daysOverdue(t);
  const prio=done?Number(t.Priority)||3:effPrio(t);
  const due=t.DueDate&&t.DueDate!=='someday'?'Due '+formatDate(t.DueDate):t.DueDate==='someday'?'Someday':'';
  return'<div class="task-item'+(done?' done':'')+(days?' '+ovClass(days):'')+'" id="ti-'+t.ID+'">'+
    '<div class="check-btn'+(done?' chk':'')+'" onclick="toggleTask(\''+t.ID+'\',\''+(done?'Pending':'Done')+'\')">'+
    '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>'+
    '<div class="task-body">'+
    (days&&!done?ovLabel(days):'')+
    '<div class="task-title">'+esc(t.Title||'')+'</div>'+
    (!compact&&due?'<div class="task-meta">'+due+(t.GoalID?' &middot; <span class="badge bl">Goal</span>':'')+
    '</div>':'')+
    '</div><div class="prio-dot p'+prio+'"></div></div>';
}
async function toggleTask(id,ns){
  const el=document.getElementById('ti-'+id);if(el)el.style.opacity='.4';
  const r=await apiPost('updateTask',{id,Status:ns});
  if(r?.ok){const t=S.tasks.find(x=>x.ID===id);if(t)t.Status=ns;
    showToast(ns==='Done'?'✅ Done!':'↩️ Reopened');renderTasks();
    if(S.screen==='today')loadToday();}
}

  const r=await apiPost('sellStock',{id,qty:Number(qty),sellPrice:Number(price),
    charges:Number(document.getElementById('inp-sc').value)||0,
    date:document.getElementById('inp-sd').value});
  if(r?.ok){const pl=Number(r.pl);closeSheet();
    showToast((pl>=0?'🟢 Profit':'🔴 Loss')+': \u20B9'+fmt(Math.abs(pl))+' in '+r.days+' days');
    loadFinance();}
}

// ── CATEGORY EDITOR ───────────────────────────────────────────
let _catTab='Expense';
async function openCatEditor(){
  await ensureCats();
  document.getElementById('sheet-inner').innerHTML=
    '<div class="sheet-title">Edit categories</div>'+
    '<div class="seg-row" style="margin-bottom:14px">'+
    '<button class="btn-seg active" onclick="catT(\'Expense\',this)">Expense</button>'+
    '<button class="btn-seg" onclick="catT(\'Income\',this)">Income</button></div>'+
    '<div id="cl-Expense">'+catLH('Expense')+'</div>'+
    '<div id="cl-Income" style="display:none">'+catLH('Income')+'</div>'+
    '<div style="display:flex;gap:8px;margin-top:12px">'+
    '<input type="text" id="inp-nc" placeholder="New category name..." style="flex:1"/>'+
    '<button onclick="addCat()" style="padding:11px 14px;border-radius:8px;background:var(--accent2);color:#fff;font-size:13px;font-weight:600;white-space:nowrap">Add</button></div>';
  _catTab='Expense';openSheet();
}
function catT(t,btn){
  _catTab=t;
  document.querySelectorAll('#bottom-sheet .btn-seg').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['Expense','Income'].forEach(x=>{const el=document.getElementById('cl-'+x);if(el)el.style.display=x===t?'block':'none';});
}
function catLH(t){
  const c=S.categories[t]||[];
  return'<div style="background:var(--bg3);border-radius:8px;border:1px solid var(--border);overflow:hidden;max-height:180px;overflow-y:auto">'+
    (c.map(x=>'<div class="cat-item"><span>'+esc(x)+'</span><span style="color:var(--red);font-size:18px;cursor:pointer;padding:0 4px" onclick="delCat(\''+t+'\',\''+esc(x)+'\')">×</span></div>').join('')||
    '<div class="cat-item" style="color:var(--muted)">No categories yet</div>')+'</div>';
}
async function addCat(){
  const n=document.getElementById('inp-nc').value.trim();if(!n)return;
  const r=await apiPost('saveCategory',{type:_catTab,name:n});
  if(r?.ok){if(!S.categories[_catTab])S.categories[_catTab]=[];S.categories[_catTab].push(n);
    document.getElementById('inp-nc').value='';
    document.getElementById('cl-'+_catTab).innerHTML=catLH(_catTab);showToast('✅ Added!');}
  else showToast(r?.error||'Already exists');
}
async function delCat(t,n){
  const r=await apiPost('deleteCategory',{type:t,name:n});
  if(r?.ok){S.categories[t]=(S.categories[t]||[]).filter(c=>c!==n);
    document.getElementById('cl-'+t).innerHTML=catLH(t);showToast('🗑️ Removed');}
}

async function openAccEditor(){
  const a=await api('getAccounts')||[];S.accounts=a;
  document.getElementById('sheet-inner').innerHTML=

      '<div><div style="font-size:13px;font-weight:500">'+esc(x.Name)+'</div><div style="font-size:11px;color:var(--muted)">'+x.Type+'</div></div>'+
      '<input type="number" value="'+Number(x.Balance||0)+'" style="width:110px;text-align:right;font-size:14px;font-weight:600;color:var(--green);background:transparent;border:none;outline:none"'+
      ' onchange="updAcc(\''+x.ID+'\',this.value)"/></div>').join('')+
    '</div><button class="btn-ghost" onclick="openAddAccount()">+ Add new account</button>';

}
function openAddAccount(){
  document.getElementById('sheet-inner').innerHTML=
    '<div class="sheet-title">Add account</div>'+
    '<div class="form-row"><label>Account name</label><input type="text" id="inp-an" placeholder="e.g. SBI Savings"/></div>'+
    '<div class="form-row"><label>Type</label><select id="inp-at">'+

    '<div class="form-row"><label>Opening balance (\u20B9)</label><input type="number" id="inp-ab" placeholder="0" inputmode="decimal"/></div>'+
    '<button class="btn-primary" onclick="submitAddAcc()">Add account</button>';
  openSheet();
}
async function updAcc(id,b){await apiPost('updateAccount',{id,balance:Number(b)});const a=S.accounts.find(x=>x.ID===id);if(a)a.Balance=Number(b);}
async function submitAddAcc(){
  const n=document.getElementById('inp-an').value.trim();if(!n){showToast('Enter account name');return;}
  const r=await apiPost('saveAccount',{name:n,type:document.getElementById('inp-at').value,
    balance:Number(document.getElementById('inp-ab').value)||0});
  if(r?.ok){closeSheet();showToast('✅ Account added!');}
}

// ── PUSH ──────────────────────────────────────────────────────
async function requestPush(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window)){showToast('Push not supported');return;}
  const p=await Notification.requestPermission();if(p!=='granted'){showToast('Permission denied');return;}
  try{const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:CFG.vapidKey||undefined});
    await apiPost('registerToken',{token:JSON.stringify(sub)});showToast('🔔 Push enabled!');}
  catch(e){showToast('Push setup failed');}
}

// ── UTILITIES ─────────────────────────────────────────────────
function isoToday(){return new Date().toISOString().slice(0,10);}
function isoAdd(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function isoMonthEnd(){const d=new Date();return new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().slice(0,10);}
function isoYearEnd(){return new Date().getFullYear()+'-12-31';}
function fmt(n){return Number(n||0).toLocaleString('en-IN');}
function formatDate(d){
  if(!d||d==='someday')return'Someday';
  try{return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
  catch(e){return String(d);}
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function configPrompt(){return'<div class="empty" style="padding:60px 30px"><div class="empty-icon">⚙️</div><div class="empty-text">Set your Apps Script URL in Settings to get started.</div><button class="btn-primary" onclick="goto(\'more\')" style="margin-top:16px;max-width:180px;margin-left:auto;margin-right:auto">Go to Settings</button></div>';}
async function ensureCats(){if(!S.categories.Income.length&&!S.categories.Expense.length){const c=await api('getCategories');if(c)S.categories=c;}}
function openSheet(){document.getElementById('sheet-overlay').classList.add('open');document.getElementById('bottom-sheet').classList.add('open');}
function closeSheet(){document.getElementById('sheet-overlay').classList.remove('open');document.getElementById('bottom-sheet').classList.remove('open');}
let _tt;function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2600);}
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
// Only load data if Script URL is already saved — otherwise show setup screen
if(CFG.scriptUrl){
  loadToday();
}else{
  document.getElementById('today-content').innerHTML=configPrompt();
  document.getElementById('today-sub').textContent='Setup required';
}
</script>
