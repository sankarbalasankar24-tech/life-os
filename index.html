<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0d0f18"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Life OS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F9E0;</text></svg>"/>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0f18;--bg2:#141720;--bg3:#1a1e2e;--card:#1c2030;--card2:#222840;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#eef0f8;--muted:#8890b0;--faint:#404568;
  --accent:#5b8af0;--accent2:#3d6ee8;
  --green:#2ecc8a;--amber:#f5a623;--red:#f0605a;--orange:#f97316;--purple:#9b72f0;--teal:#26c6b8;
  --font:'DM Sans',sans-serif;--serif:'DM Serif Display',serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  --nav:62px;--r:14px;--rs:9px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:var(--font);color:var(--text);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);padding:11px 14px;font-size:14px;width:100%;outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
select option{background:var(--bg2)}
textarea{resize:none;line-height:1.6}
::-webkit-scrollbar{width:0;height:0}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
#screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav) + var(--safe-bot) + 16px);display:none;animation:fadeUp .2s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page-header{padding:18px 18px 6px;position:sticky;top:0;z-index:10;background:var(--bg)}
.page-header h1{font-family:var(--serif);font-size:25px;font-weight:400}
.page-header .sub{color:var(--muted);font-size:12px;margin-top:2px}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
#nav{height:calc(var(--nav) + var(--safe-bot));padding-bottom:var(--safe-bot);display:flex;background:rgba(13,15,24,.94);backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:100;flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--faint);font-size:9px;letter-spacing:.4px;text-transform:uppercase;font-weight:500;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin:0 14px 10px}
.card-sm{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:12px 14px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 14px 10px}
.stat-card{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:14px}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:500;margin-bottom:3px}
.stat-val{font-size:22px;font-weight:600;line-height:1}
.g{color:var(--green)}.r{color:var(--red)}.ac{color:var(--accent)}.pu{color:var(--purple)}.am{color:var(--amber)}
.sec-title{padding:14px 18px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600}
.tabs{display:flex;gap:6px;padding:6px 14px 12px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;background:var(--card);border:1px solid var(--border);color:var(--muted);white-space:nowrap;transition:all .15s}
.tab.active{background:rgba(91,138,240,.18);color:var(--accent);border-color:rgba(91,138,240,.35)}
.task-list{display:flex;flex-direction:column;gap:7px;padding:0 14px}
.task-item{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);display:flex;align-items:flex-start;gap:11px;padding:12px 14px;animation:fadeUp .2s ease}
.task-item.done{opacity:.35}
.task-item.done .task-title{text-decoration:line-through}
.task-item.ov1{border-left:3px solid var(--amber)}
.task-item.ov3{border-left:3px solid var(--orange)}
.task-item.ov7{border-left:3px solid var(--red);background:rgba(240,96,90,.06)}
.ob{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;display:inline-block;margin-bottom:3px}
.ob1{background:rgba(245,166,35,.15);color:var(--amber)}
.ob3{background:rgba(249,115,22,.15);color:var(--orange)}
.ob7{background:rgba(240,96,90,.18);color:var(--red)}
.check-btn{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;margin-top:2px}
.check-btn.chk{background:var(--green);border-color:var(--green)}
.check-btn svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .12s}
.check-btn.chk svg{opacity:1}
.task-body{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{font-size:11px;color:var(--muted);margin-top:2px}
.prio-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.p1{background:var(--red)}.p2{background:var(--orange)}.p3{background:var(--amber)}.p4{background:var(--accent)}.p5{background:var(--faint)}
.prog-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent2),var(--teal));transition:width .5s ease}
.goal-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin:0 14px 10px;animation:fadeUp .2s ease}
.subtask-list{margin-top:12px;display:flex;flex-direction:column;gap:5px}
.subtask-item{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--bg3);border-radius:8px;font-size:13px}
.subtask-item.done{opacity:.4}.subtask-item.done span{text-decoration:line-through}
.fin-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.fin-row:last-child{border-bottom:none}
.fin-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.fin-body{flex:1;min-width:0}
.fin-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fin-sub{font-size:11px;color:var(--muted);margin-top:1px}
.fin-amt{font-size:14px;font-weight:600;white-space:nowrap}
.inc{color:var(--green)}.exp{color:var(--red)}
.stock-row{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:14px;margin-bottom:8px}
.stock-detail{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.stock-detail-item{font-size:11px;color:var(--muted)}
.stock-detail-item span{color:var(--text);font-weight:500}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500}
.bg{background:rgba(46,204,138,.12);color:var(--green);border:1px solid rgba(46,204,138,.2)}
.ba{background:rgba(245,166,35,.12);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.bl{background:rgba(91,138,240,.15);color:var(--accent);border:1px solid rgba(91,138,240,.25)}
.pl-row{display:flex;gap:8px;padding:0 14px;margin-bottom:10px}
.pl-card{border-radius:var(--rs);border:1px solid var(--border);padding:12px;flex:1;text-align:center}
.pl-profit{background:rgba(46,204,138,.08);border-color:rgba(46,204,138,.22)}
.pl-loss{background:rgba(240,96,90,.08);border-color:rgba(240,96,90,.22)}
.pl-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.pl-val{font-size:17px;font-weight:700}
.ov-strip{margin:0 14px 10px;background:rgba(240,96,90,.09);border:1px solid rgba(240,96,90,.22);border-radius:var(--rs);padding:10px 14px}
.ov-title{font-size:12px;font-weight:600;color:var(--red);margin-bottom:4px}
.ov-item{font-size:12px;color:var(--muted);padding:2px 0}
.today-banner{margin:0 14px 14px;background:linear-gradient(135deg,rgba(61,110,232,.22),rgba(38,198,184,.12));border:1px solid rgba(91,138,240,.22);border-radius:var(--r);padding:18px}
.today-greeting{font-family:var(--serif);font-size:22px;margin-top:3px}
.acc-card{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:14px 16px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.journal-entry{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:14px;margin-bottom:8px}
.journal-time{font-size:11px;color:var(--muted);margin-bottom:5px}
.journal-text{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.settings-section{background:var(--card);border-radius:var(--r);border:1px solid var(--border);margin:0 14px 10px;overflow:hidden}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:14px;font-weight:500}
.settings-sub{font-size:11px;color:var(--muted);margin-top:2px}
#fab{position:fixed;bottom:calc(var(--nav) + var(--safe-bot) + 14px);right:17px;width:50px;height:50px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center;z-index:200;box-shadow:0 4px 20px rgba(61,110,232,.4);transition:transform .13s}
#fab:active{transform:scale(.9)}
#fab svg{width:21px;height:21px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.search-bar{display:flex;align-items:center;gap:10px;margin:0 14px 10px;background:var(--card);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 14px}
.search-bar svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.search-bar input{background:none;border:none;outline:none;font-size:14px;flex:1;padding:0;color:var(--text)}
#sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(3px)}
#sheet-overlay.open{opacity:1;pointer-events:auto}
#bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:18px 18px 0 0;z-index:400;padding:10px 18px 18px;padding-bottom:calc(18px + var(--safe-bot));max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1)}
#bottom-sheet.open{transform:translateY(0)}
.sheet-handle{width:34px;height:4px;background:var(--faint);border-radius:2px;margin:0 auto 16px}
.sheet-title{font-size:16px;font-weight:600;margin-bottom:16px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.btn-primary{width:100%;padding:14px;border-radius:var(--rs);background:var(--accent2);color:#fff;font-size:15px;font-weight:600;text-align:center;transition:opacity .13s;margin-top:4px}
.btn-primary:active{opacity:.8}
.btn-ghost{width:100%;padding:13px;border-radius:var(--rs);background:var(--bg3);color:var(--text);font-size:14px;font-weight:500;text-align:center;border:1px solid var(--border2);margin-top:8px}
.btn-seg{flex:1;padding:9px;border-radius:8px;background:var(--bg3);color:var(--muted);font-size:13px;font-weight:500;text-align:center;transition:all .13s;border:1px solid var(--border)}
.btn-seg.active{background:rgba(91,138,240,.18);color:var(--accent);border-color:rgba(91,138,240,.35)}
.seg-row{display:flex;gap:8px;margin-bottom:12px}
.date-chip{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;background:var(--bg3);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .13s;display:inline-block;margin:0 4px 6px 0}
.date-chip.sel{background:rgba(91,138,240,.18);color:var(--accent);border-color:rgba(91,138,240,.35)}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.cat-item:last-child{border-bottom:none}
.subcat-item{display:flex;align-items:center;justify-content:space-between;padding:7px 14px 7px 28px;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted)}
.subcat-item:last-child{border-bottom:none}
#toast{position:fixed;top:calc(var(--safe-top)+14px);left:50%;transform:translateX(-50%) translateY(-70px);background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:9px 16px;font-size:13px;font-weight:500;z-index:999;transition:transform .25s ease;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
.spinner{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;margin:24px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:34px;margin-bottom:10px}
.empty-text{font-size:13px;line-height:1.6}
.memory-card{background:var(--card);border-radius:var(--rs);border:1px solid rgba(155,114,240,.25);padding:12px 14px;margin-bottom:7px}
.memory-when{font-size:10px;color:var(--purple);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.memory-text{font-size:13px}
</style>
</head>
<body>
<div id="app">
  <div id="screens">

    <div class="screen active" id="screen-today">
      <div class="page-header"><h1>Today</h1><div class="sub" id="today-sub"></div></div>
      <div id="today-content"><div class="spinner"></div></div>
    </div>

    <div class="screen" id="screen-tasks">
      <div class="page-header"><h1>Tasks</h1></div>
      <div class="search-bar">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="task-search" placeholder="Search tasks..." oninput="renderTasks()"/>
      </div>
      <div class="tabs" id="task-tabs">
        <button class="tab active" onclick="filterTasks('pending')">Pending</button>
        <button class="tab" onclick="filterTasks('overdue')">Overdue</button>
        <button class="tab" onclick="filterTasks('today')">Today</button>
        <button class="tab" onclick="filterTasks('week')">This week</button>
        <button class="tab" onclick="filterTasks('month')">This month</button>
        <button class="tab" onclick="filterTasks('someday')">Someday</button>
        <button class="tab" onclick="filterTasks('done')">Done</button>
      </div>
      <div id="tasks-progress"></div>
      <div id="tasks-content"><div class="spinner"></div></div>
    </div>

    <div class="screen" id="screen-goals">
      <div class="page-header"><h1>Goals</h1><div class="sub">Long-term projects</div></div>
      <div id="goals-content"><div class="spinner"></div></div>
    </div>

    <div class="screen" id="screen-finance">
      <div class="page-header">
        <div class="header-row">
          <h1>Finance</h1>
          <div style="display:flex;gap:4px;flex-wrap:wrap">
            <button class="tab active" id="fp-day" onclick="setFinPeriod('day')">Day</button>
            <button class="tab" id="fp-week" onclick="setFinPeriod('week')">Week</button>
            <button class="tab" id="fp-month" onclick="setFinPeriod('month')">Month</button>
            <button class="tab" id="fp-year" onclick="setFinPeriod('year')">Year</button>
            <button class="tab" id="fp-all" onclick="setFinPeriod('all')">All</button>
          </div>
        </div>
      </div>
      <div class="search-bar">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="fin-search" placeholder="Search transactions..." oninput="searchFin(this.value)"/>
      </div>
      <div class="tabs" id="fin-tabs">
        <button class="tab active" onclick="finTab('overview')">Overview</button>
        <button class="tab" onclick="finTab('transactions')">Transactions</button>
        <button class="tab" onclick="finTab('accounts')">Accounts</button>
        <button class="tab" onclick="finTab('stocks')">Stocks</button>
        <button class="tab" onclick="finTab('mf')">Mutual funds</button>
      </div>
      <div id="finance-content"><div class="spinner"></div></div>
    </div>

    <div class="screen" id="screen-journal">
      <div class="page-header">
        <div class="header-row">
          <div><h1>Journal</h1><div class="sub">Thoughts &amp; ideas</div></div>
          <button onclick="openAddJournal()" style="width:36px;height:36px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center">
            <svg width="16" height="16" viewBox="0 0 24 24" stroke="#fff" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>
      <div class="search-bar"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search journal..." oninput="searchJournal(this.value)"/></div>
      <div id="journal-content"><div class="spinner"></div></div>
    </div>

    <div class="screen" id="screen-more">
      <div class="page-header"><h1>Settings</h1></div>
      <div id="more-content"></div>
    </div>

    <div class="screen" id="screen-memories">
      <div class="page-header">
        <div class="header-row">
          <div><h1>Memories</h1><div class="sub">Moments worth keeping</div></div>
          <button onclick="openAddMemory()" style="width:36px;height:36px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center">
            <svg width="16" height="16" viewBox="0 0 24 24" stroke="#fff" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>
      <div class="search-bar"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search memories..." oninput="searchMemories(this.value)"/></div>
      <div id="memories-content"><div class="spinner"></div></div>
    </div>

  </div>
  <nav id="nav">
    <button class="nav-btn active" onclick="goto('today')" id="nav-today">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Today
    </button>
    <button class="nav-btn" onclick="goto('tasks')" id="nav-tasks">
      <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Tasks
    </button>
    <button class="nav-btn" onclick="goto('goals')" id="nav-goals">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Goals
    </button>
    <button class="nav-btn" onclick="goto('finance')" id="nav-finance">
      <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 1 0 0 7h5a3.5 3.5 0 1 1 0 7H6"/></svg>Finance
    </button>
    <button class="nav-btn" onclick="goto('journal')" id="nav-journal">
      <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Journal
    </button>
    <button class="nav-btn" onclick="goto('memories')" id="nav-memories">

<script>
var CFG = {

  fbKey: localStorage.getItem('fbKey') || ''

var S = {

// API
async function api(action, params) {
  if (!CFG.scriptUrl) return null;
  try {
    var p = params || {};
    var r = await fetch(CFG.scriptUrl + '?action=' + action + '&' + new URLSearchParams(p));
    return await r.json();
  } catch(e) { showToast('Connection error'); return null; }
}
async function apiPost(action, data) {
  if (!CFG.scriptUrl) { showToast('Set Script URL in More > Settings'); return null; }
  try {
    var r = await fetch(CFG.scriptUrl, {method:'POST', body:JSON.stringify({action:action, data:data||{}})});
    return await r.json();
  } catch(e) { showToast('Connection error'); return null; }
}

// NAV
function goto(s) {
  document.querySelectorAll('.screen').forEach(function(x){x.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(x){x.classList.remove('active');});
  document.getElementById('screen-'+s).classList.add('active');
  document.getElementById('nav-'+s).classList.add('active');
  S.screen = s;
  if (s==='today') loadToday();
  if (s==='tasks') loadTasks();
  if (s==='goals') loadGoals();
  if (s==='finance') loadFinance();
  if (s==='journal') loadJournal();
  if (s==='more') renderSettings();
  if (s==='memories') loadMemories();
}

// OVERDUE
function daysOverdue(t) {
  if (t.Status==='Done' || !t.DueDate || t.DueDate==='someday') return 0;
  var due = new Date(t.DueDate), now = new Date();
  now.setHours(0,0,0,0);
  var d = Math.floor((now - due) / 86400000);
  return d > 0 ? d : 0;
}
function effPrio(t) {
  var d = daysOverdue(t), p = Number(t.Priority) || 3;
  if (d >= 7) return 1;
  if (d >= 3) return Math.min(p, 2);
  if (d >= 1) return Math.min(p, 3);
  return p;
}
function ovClass(d) { return d>=7?'ov7':d>=3?'ov3':d>=1?'ov1':''; }
function ovLabel(d) {
  if (d>=7) return '<span class="ob ob7">7+ days overdue - urgent!</span>';
  if (d>=3) return '<span class="ob ob3">'+d+'d overdue</span>';
  if (d>=1) return '<span class="ob ob1">'+d+'d overdue</span>';
  return '';
}

// PIE CHART
function buildPie(data, r, cx, cy) {
  cx = cx || (r + 4); cy = cy || (r + 4);
  var tot = data.reduce(function(s,d){return s+d.v;}, 0);
  if (!tot) return {svg:'', legend:[]};
  var ang = -Math.PI/2, svg = '', legend = [];
  data.forEach(function(d, i) {
    var sl = (d.v/tot)*2*Math.PI;
    var x1 = cx + r*Math.cos(ang), y1 = cy + r*Math.sin(ang);
    ang += sl;
    var x2 = cx + r*Math.cos(ang), y2 = cy + r*Math.sin(ang);
    var lg = sl > Math.PI ? 1 : 0;
    var c = PIE_COLORS[i % PIE_COLORS.length];
    svg += '<path d="M'+cx+','+cy+' L'+x1.toFixed(1)+','+y1.toFixed(1)+
      ' A'+r+','+r+' 0 '+lg+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+' Z"'+
      ' fill="'+c+'" stroke="var(--bg)" stroke-width="1.5"/>';
    legend.push({label:d.k, v:d.v, color:c, pct:Math.round(d.v/tot*100)});
  });
  svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+Math.round(r*0.52)+'" fill="var(--card)"/>';
  return {svg:svg, legend:legend};
}
function renderPie(elId, data) {
  var el = document.getElementById(elId);
  if (!el) return;
  var tot = data.reduce(function(s,d){return s+d.v;}, 0);
  if (!tot) { el.innerHTML = '<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">No data for this period</div>'; return; }
  var res = buildPie(data, 68, 72, 72);
  var legendHtml = res.legend.map(function(l) {
    return '<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">'+
      '<div style="width:8px;height:8px;border-radius:50%;background:'+l.color+';flex-shrink:0"></div>'+
      '<div style="flex:1;font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(l.label)+'</div>'+
      '<div style="font-size:11px;font-weight:600;white-space:nowrap">&#8377;'+fmt(l.v)+
      ' <span style="color:var(--muted);font-weight:400">'+l.pct+'%</span></div></div>';
  }).join('');
  el.innerHTML = '<div style="display:flex;gap:14px;align-items:center">'+
    '<svg width="144" height="144" viewBox="0 0 144 144" style="flex-shrink:0">'+res.svg+'</svg>'+
    '<div style="flex:1">'+legendHtml+
    '<div style="border-top:1px solid var(--border);padding-top:6px;margin-top:2px;font-size:11px;font-weight:600">Total: &#8377;'+fmt(tot)+'</div>'+
    '</div></div>';
}

// TODAY
async function loadToday() {
  var el = document.getElementById('today-content');
  if (!CFG.scriptUrl) { el.innerHTML = configPrompt(); document.getElementById('today-sub').textContent = 'Setup required'; return; }
  var now = new Date();
  var DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var dateStr = DAYS[now.getDay()] + ', ' + now.getDate() + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();
  document.getElementById('today-sub').textContent = dateStr;
  var hr = now.getHours();
  var greet = hr<12 ? 'Good morning' : hr<17 ? 'Good afternoon' : 'Good evening';
  var results = await Promise.all([api('getToday'), api('getStats'), api('getFinance', {period:'day'})]);
  var data = results[0], stats = results[1], finDay = results[2];
  if (!data) { el.innerHTML = configPrompt(); return; }
  var tasks = data.tasks || [], events = data.events || [], memories = data.memories || [];
  var pct = stats ? (stats.pct||0) : 0;
  var emoji = pct>=80?'Trophy':pct>=50?'Strong':pct>=20?'OK':'Rest';
  var emojiChar = pct>=80?'&#x1F3C6;':pct>=50?'&#x1F4AA;':pct>=20?'&#x1F642;':'&#x1F634;';
  var ovTasks = tasks.filter(function(t){return daysOverdue(t)>0;});
  var expCats = [];
  if (finDay && finDay.byCategory) {
    Object.keys(finDay.byCategory).forEach(function(k){expCats.push({k:k,v:finDay.byCategory[k]});});
    expCats.sort(function(a,b){return b.v-a.v;});
  }

  // Build "On This Day" from memories + past finance/tasks history
  var onThisDay = memories.slice();
  // Add synthetic memories from finance history
  if (finDay && finDay.onThisDay) {
    finDay.onThisDay.forEach(function(m){onThisDay.push(m);});
  }

  var html = '';
  html += '<div class="today-banner">';
  html += '<div style="font-size:12px;color:var(--muted)">'+dateStr+'</div>';
  html += '<div class="today-greeting">'+greet+' &#x1F44B;</div>';
  html += '<div style="font-size:12px;color:var(--muted);margin-top:5px">'+tasks.length+' pending &middot; '+events.length+' event'+(events.length!==1?'s':'')+' today</div>';
  html += '</div>';

  html += '<div style="display:flex;gap:8px;padding:0 14px;margin-bottom:10px">';
  html += '<div class="stat-card" style="flex:1"><div class="stat-label">Tasks done</div>';
  html += '<div style="display:flex;align-items:center;gap:8px"><div class="stat-val ac">'+(stats?stats.done||0:0)+'</div><div style="font-size:20px">'+emojiChar+'</div></div>';
  html += '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>';
  html += '<div style="font-size:10px;color:var(--muted);margin-top:4px">'+pct+'% of '+(stats?stats.total||0:0)+' total</div></div>';
  html += '<div class="stat-card" style="flex:1"><div class="stat-label">Today spent</div>';
  html += '<div class="stat-val r">&#8377;'+fmt(finDay?finDay.expense||0:0)+'</div>';
  html += '<div style="font-size:10px;color:var(--green);margin-top:4px">In: &#8377;'+fmt(finDay?finDay.income||0:0)+'</div></div>';
  html += '</div>';

  if (expCats.length) {
    html += '<div class="sec-title">Today\'s spending by category</div>';
    html += '<div class="card"><div id="today-pie"></div></div>';
  }

  if (ovTasks.length) {
    html += '<div class="ov-strip"><div class="ov-title">'+ovTasks.length+' overdue task'+(ovTasks.length>1?'s':'')+' - needs attention</div>';
    ovTasks.slice(0,3).forEach(function(t){ html += '<div class="ov-item">&middot; '+esc(t.Title)+' ('+daysOverdue(t)+'d late)</div>'; });
    if (ovTasks.length>3) html += '<div class="ov-item" style="color:var(--accent)">+ '+(ovTasks.length-3)+' more in Tasks tab</div>';
    html += '</div>';
  }

  if (onThisDay.length) {
    html += '<div class="sec-title">On this day</div><div style="padding:0 14px;margin-bottom:4px">';
    onThisDay.forEach(function(m) {
      html += '<div class="memory-card">';
      html += '<div class="memory-when">'+(m.when||'Memory')+'</div>';
      html += '<div class="memory-text">'+esc(m.Title||m.text||'')+(m.Description?' &middot; '+esc(m.Description):'')+'</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  if (events.length) {
    html += '<div class="sec-title">Today\'s events</div><div style="padding:0 14px;margin-bottom:4px">';
    events.forEach(function(e) {
      html += '<div class="card-sm" style="margin-bottom:7px"><div style="font-size:13px;font-weight:600;color:var(--amber)">&#x1F4C5; '+esc(e.Title)+'</div>';
      html += '<div style="font-size:11px;color:var(--muted);margin-top:2px">'+esc(e.Notes||e.Type||'')+'</div></div>';
    });
    html += '</div>';
  }

  html += '<div class="sec-title">Today\'s priorities</div>';
  html += '<div class="task-list">';
  if (tasks.length) {
    tasks.slice(0,8).forEach(function(t){ html += taskItem(t, true); });
  } else {
    html += '<div class="empty"><div class="empty-icon">&#x2705;</div><div class="empty-text">All clear! Tap + to add tasks.</div></div>';
  }
  html += '</div>';
  html += '<div style="padding:0 14px;margin-top:10px"><button class="btn-ghost" onclick="openNightLog()">Log today\'s summary</button></div>';

  el.innerHTML = html;
  if (expCats.length) renderPie('today-pie', expCats);
}

// TASKS
async function loadTasks() {
  var d = await api('getTasks');
  if (!d) return;
  S.tasks = Array.isArray(d) ? d : [];
  renderTasks();
}
function filterTasks(f) {
  S.taskFilter = f;
  var L = ['pending','overdue','today','week','month','someday','done'];
  document.querySelectorAll('#task-tabs .tab').forEach(function(t,i){t.classList.toggle('active', L[i]===f);});
  renderTasks();
}
function renderTasks() {
  var ts = isoToday(), ws = isoAdd(7), ms = isoMonthEnd();
  var q = (document.getElementById('task-search') ? document.getElementById('task-search').value.toLowerCase() : '');
  var list = S.tasks;
  if (S.taskFilter==='pending') list = list.filter(function(t){return t.Status!=='Done' && t.DueDate!=='someday';});
  else if (S.taskFilter==='overdue') list = list.filter(function(t){return t.Status!=='Done' && daysOverdue(t)>0;});
  else if (S.taskFilter==='today') list = list.filter(function(t){return t.Status!=='Done' && String(t.DueDate).slice(0,10)===ts;});
  else if (S.taskFilter==='week') list = list.filter(function(t){return t.Status!=='Done' && t.DueDate && t.DueDate<=ws;});
  else if (S.taskFilter==='month') list = list.filter(function(t){return t.Status!=='Done' && t.DueDate && t.DueDate<=ms;});
  else if (S.taskFilter==='someday') list = list.filter(function(t){return t.Status!=='Done' && (!t.DueDate||t.DueDate==='someday');});
  else if (S.taskFilter==='done') list = list.filter(function(t){return t.Status==='Done';});
  if (q) list = list.filter(function(t){return (t.Title||'').toLowerCase().includes(q) || (t.Notes||'').toLowerCase().includes(q);});
  if (S.taskFilter!=='done') list = list.slice().sort(function(a,b){return effPrio(a)-effPrio(b);});
  var done = S.tasks.filter(function(t){return t.Status==='Done';}).length;
  var total = S.tasks.length;
  var pct = total ? Math.round(done/total*100) : 0;
  var oc = S.tasks.filter(function(t){return t.Status!=='Done' && daysOverdue(t)>0;}).length;
  var r28 = 2*Math.PI*28;
  var prog = total ? '<div style="display:flex;align-items:center;gap:14px;padding:0 14px;margin-bottom:10px">'+
    '<div style="position:relative;width:68px;height:68px;flex-shrink:0">'+
    '<svg width="68" height="68" viewBox="0 0 68 68">'+
    '<circle cx="34" cy="34" r="28" fill="none" stroke="var(--bg3)" stroke-width="6"/>'+
    '<circle cx="34" cy="34" r="28" fill="none" stroke="var(--accent)" stroke-width="6"'+
    ' stroke-dasharray="'+r28.toFixed(1)+'" stroke-dashoffset="'+(r28*(1-pct/100)).toFixed(1)+'"'+
    ' stroke-linecap="round" transform="rotate(-90 34 34)"/></svg>'+
    '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent)">'+pct+'%</div>'+
    '</div><div>'+
    '<div style="font-size:13px;font-weight:500">'+done+'/'+total+' done</div>'+
    (oc?'<div style="font-size:11px;color:var(--red);margin-top:2px">'+oc+' overdue</div>':'')+
    '</div></div>' : '';
  document.getElementById('tasks-progress').innerHTML = prog;
  document.getElementById('tasks-content').innerHTML = list.length ?
    '<div class="task-list">'+list.map(function(t){return taskItem(t,false);}).join('')+'</div>' :
    '<div class="empty"><div class="empty-icon">&#x1F4CB;</div><div class="empty-text">'+(S.taskFilter==='overdue'?'No overdue tasks!':'No tasks here. Tap + to add.')+'</div></div>';
}
function taskItem(t, compact) {
  var done = t.Status==='Done', days = done?0:daysOverdue(t);
  var prio = done ? (Number(t.Priority)||3) : effPrio(t);
  var due = (t.DueDate && t.DueDate!=='someday') ? 'Due '+formatDate(t.DueDate) : (t.DueDate==='someday'?'Someday':'');
  var oc = ovClass(days);
  var title = esc(t.Title||'');
  var memBtn = !compact ? '<button data-title="'+title+'" data-src="task" onclick="quickMemory(this.dataset.title,this.dataset.src)" style="font-size:10px;color:var(--purple);padding:2px 6px;border-radius:4px;background:rgba(155,114,240,.1);border:1px solid rgba(155,114,240,.2);margin-top:4px">+ Memory</button>' : '';
  return '<div class="task-item'+(done?' done':'')+(oc?' '+oc:'')+'" id="ti-'+t.ID+'">'+
    '<div class="check-btn'+(done?' chk':'')+'" onclick="toggleTask(\''+t.ID+'\',\''+( done?'Pending':'Done')+'\')">'+
    '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>'+
    '<div class="task-body">'+
    (days&&!done?ovLabel(days):'')+
    '<div class="task-title">'+title+'</div>'+
    (!compact&&due?'<div class="task-meta">'+due+(t.GoalID?' &middot; <span class="badge bl">Goal</span>':'')+(t.Category?' &middot; '+esc(t.Category):'')+'</div>':'')+
    memBtn+
    '</div><div class="prio-dot p'+prio+'"></div></div>';
}
async function toggleTask(id, ns) {
  var el = document.getElementById('ti-'+id);
  if (el) el.style.opacity = '.4';
  var r = await apiPost('updateTask', {id:id, Status:ns});
  if (r && r.ok) {
    var t = S.tasks.find(function(x){return x.ID===id;});
    if (t) t.Status = ns;
    showToast(ns==='Done'?'Done!':'Reopened');
    renderTasks();
    if (S.screen==='today') loadToday();
  }
}

// GOALS
async function loadGoals() {
  var d = await api('getGoals');
  var el = document.getElementById('goals-content');
  if (!d||!d.length) { el.innerHTML='<div class="empty"><div class="empty-icon">&#x1F3AF;</div><div class="empty-text">No goals yet. Tap + to add your first.</div></div>'; return; }
  S.goals = d;
  var html = '';
  d.forEach(function(g) {
    var subs = g.subTasks || [];
    var doneCount = subs.filter(function(t){return t.Status==='Done';}).length;
    var pct = subs.length ? Math.round(doneCount/subs.length*100) : 0;
    html += '<div class="goal-card">';
    html += '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">';
    html += '<div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:600;margin-bottom:3px">'+esc(g.Title||'')+'</div>';
    if (g.Description) html += '<div style="font-size:12px;color:var(--muted);margin-bottom:8px">'+esc(g.Description)+'</div>';
    html += '</div><span class="badge '+(g.Status==='Active'?'bg':'ba')+'">'+( g.Status||'Active')+'</span></div>';
    if (g.TargetDate && g.TargetDate!=='someday') html += '<div style="font-size:11px;color:var(--muted);margin-bottom:8px">Target: '+formatDate(g.TargetDate)+'</div>';
    html += '<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px">';
    html += '<span style="color:var(--muted)">'+doneCount+'/'+subs.length+' steps</span>';
    html += '<span style="color:var(--accent);font-weight:600">'+pct+'%</span></div>';
    html += '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>';
    if (subs.length) {
      html += '<div class="subtask-list">';
      subs.forEach(function(st) {
        html += '<div class="subtask-item'+(st.Status==='Done'?' done':'')+'">';
        html += '<div class="check-btn'+(st.Status==='Done'?' chk':'')+'" style="width:19px;height:19px;flex-shrink:0" onclick="toggleTask(\''+st.ID+'\',\''+(st.Status==='Done'?'Pending':'Done')+'\')">'+
          '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>';
        html += '<span style="flex:1;font-size:13px">'+esc(st.Title||'')+'</span>';
        if (st.DueDate && st.DueDate!=='someday') html += '<span style="font-size:10px;color:var(--muted)">'+formatDate(st.DueDate)+'</span>';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '<div style="display:flex;gap:8px;margin-top:12px">';
    html += '<button class="btn-ghost" style="font-size:12px;padding:9px;margin-top:0;flex:1" onclick="openAddSubTask(\''+g.ID+'\',\''+esc(g.Title||'')+'\')">+ Add step</button>';

function plCard(label, val) {

    '<div class="pl-label">'+label+'</div>' +

    '<div style="font-size:10px;margin-top:3px;color:'+(prof?'var(--green)':'var(--red)')+'">'+

function renderFinOverview() {
  var d = S.finance || {};
  var shortPL = S.stocks.filter(function(s){return s.Term==='short';}).reduce(function(s,st){return s+Number(st.pl||0);},0);
  var longPL = S.stocks.filter(function(s){return s.Term==='long';}).reduce(function(s,st){return s+Number(st.pl||0);},0);
  var netPL = shortPL + longPL;
  var nw = S.accounts.reduce(function(s,a){return s+Number(a.Balance||0);}, 0);
  var bal = Number(d.balance||0);
  var expData = [];
  if (d.byCategory) Object.keys(d.byCategory).forEach(function(k){expData.push({k:k,v:d.byCategory[k]});});

  html += '<div class="stat-card"><div class="stat-label">Balance</div><div class="stat-val '+(bal>=0?'ac':'r')+'">&#8377;'+fmt(bal)+'</div></div>';

function renderFinMF() {
  var tot = S.mf.reduce(function(s,m){return s+Number(m.Units)*(Number(m.CurrentNAV)||Number(m.BuyNAV));},0);

        '</div></div>';

function openPushSetup() {
  document.getElementById('sheet-inner').innerHTML =
    '<div class="sheet-title">Push Notifications</div>' +
    '<div style="background:rgba(91,138,240,.1);border:1px solid rgba(91,138,240,.2);border-radius:8px;padding:12px;margin-bottom:14px;font-size:12px;line-height:1.7;color:var(--muted)">' +
    'Push notifications require Firebase setup. Steps:<br>' +
    '1. Go to console.firebase.google.com<br>' +
    '2. Create project > Add web app<br>' +
    '3. Go to Project Settings > Cloud Messaging<br>' +
    '4. Copy the VAPID public key<br>' +
    '5. Paste it below and enable notifications' +
    '</div>' +
    '<div class="form-row"><label>Firebase VAPID Key</label>' +
    '<input type="text" id="inp-vapid" placeholder="Paste VAPID public key..." value="'+esc(CFG.vapidKey)+'"/></div>' +
    '<button class="btn-primary" onclick="saveVapid()">Save VAPID key</button>' +
    '<button class="btn-ghost" onclick="requestPush()" style="margin-top:8px">Enable push notifications</button>' +
    '<div style="margin-top:12px;font-size:11px;color:var(--muted)">Without Firebase, morning brief and night review run on the server but cannot reach your phone when the app is closed.</div>';
  openSheet();
}
function saveVapid() {
  CFG.vapidKey = document.getElementById('inp-vapid').value.trim();
  localStorage.setItem('vapidKey', CFG.vapidKey);
  showToast('VAPID key saved!');
}
async function requestPush() {
  if (!('serviceWorker' in navigator)||!('PushManager' in window)) { showToast('Push not supported'); return; }
  var p = await Notification.requestPermission();
  if (p!=='granted') { showToast('Permission denied'); return; }
  try {
    var reg = await navigator.serviceWorker.ready;
    var opts = {userVisibleOnly:true};
    if (CFG.vapidKey) opts.applicationServerKey = CFG.vapidKey;
    var sub = await reg.pushManager.subscribe(opts);
    await apiPost('registerToken', {token:JSON.stringify(sub)});
    showToast('Push enabled!');
  } catch(e) { showToast('Setup failed - check VAPID key'); }
}

function setCatTab(t) { _catTab = t; _expandedCat = null; renderCatEditor(); }

function deleteCat(cat) {
  var cats = getCats(); delete cats[_catTab][cat]; saveCats(cats);
  if (_expandedCat===cat) _expandedCat = null;
  renderCatEditor(); showToast('Deleted');

function deleteSubCat(cat, sub) {
  var cats = getCats();
  cats[_catTab][cat] = (cats[_catTab][cat]||[]).filter(function(s){return s!==sub;});
  saveCats(cats); renderCatEditor(); showToast('Removed');
}
function addMainCat() {
  var n = document.getElementById('inp-new-cat').value.trim();
  if (!n) return;
  var cats = getCats();
  if (!cats[_catTab]) cats[_catTab] = {};
  cats[_catTab][n] = [];
  saveCats(cats); renderCatEditor(); showToast('Category added!');
}
function addSubCat(cat) {
  var el = document.getElementById('inp-sub-'+cat);
  if (!el) return;
  var n = el.value.trim(); if (!n) return;
  var cats = getCats();
  if (!cats[_catTab][cat]) cats[_catTab][cat] = [];
  if (cats[_catTab][cat].indexOf(n) === -1) cats[_catTab][cat].push(n);
  saveCats(cats); renderCatEditor(); showToast('Subcategory added!');
}

  var cats = getCats();

function fstockSug(q) {
  var b = document.getElementById('sug');

  var m = STOCK_LIST.filter(function(s){return s.indexOf(q.toUpperCase())!==-1;}).slice(0,8);
  b.style.display = m.length ? 'block' : 'none';
  b.innerHTML = m.map(function(s) {
    return '<div onclick="selS(\''+s+'\')" style="padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)">'+s+'</div>';
  }).join('');
}

// UTILS
function isoToday() { return new Date().toISOString().slice(0,10); }
function isoAdd(n) { var d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function isoMonthEnd() { var d=new Date(); return new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().slice(0,10); }
function isoYearEnd() { return new Date().getFullYear()+'-12-31'; }
function fmt(n) { return Number(n||0).toLocaleString('en-IN'); }
function formatDate(d) {
  if (!d||d==='someday') return 'Someday';
  try { return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); } catch(e) { return String(d); }
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function configPrompt() {
  return '<div class="empty" style="padding:60px 30px"><div class="empty-icon">&#x2699;&#xFE0F;</div>'+
    '<div class="empty-text">Set your Apps Script URL in Settings to get started.</div>'+
    '<button class="btn-primary" onclick="goto(\'more\')" style="margin-top:16px;max-width:180px;margin-left:auto;margin-right:auto">Go to Settings</button></div>';
}
function openSheet() { document.getElementById('sheet-overlay').classList.add('open'); document.getElementById('bottom-sheet').classList.add('open'); }
function closeSheet() { document.getElementById('sheet-overlay').classList.remove('open'); document.getElementById('bottom-sheet').classList.remove('open'); }
var _tt;
function showToast(m) { var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(function(){t.classList.remove('show');},2600); }

// MEMORIES
async function loadMemories() {
  var d = await api('getMemories');
  renderMemList(Array.isArray(d)?d:[]);
}
function renderMemList(list) {
  var el = document.getElementById('memories-content');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">&#x1F5BC;&#xFE0F;</div><div class="empty-text">No memories yet.<br>Add them from journal, tasks or finance entries, or tap + to add directly.</div></div>';
    return;
  }
  el.innerHTML = '<div style="padding:0 14px">'+list.map(function(m) {
    var hasPhoto = m.PhotoUrl && m.PhotoUrl.length > 0;
    return '<div class="memory-card" style="margin-bottom:10px;padding:14px">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
      '<div><div class="memory-when">'+(m.Date?formatDate(m.Date):'')+(m.Source?' &middot; from '+esc(m.Source):'')+'</div>'+
      '<div style="font-size:14px;font-weight:500;margin-top:3px">'+esc(m.Title||'')+'</div>'+
      (m.Description?'<div style="font-size:12px;color:var(--muted);margin-top:3px">'+esc(m.Description)+'</div>':'')+
      '</div>'+
      '<button data-ctx="memory" data-id="'+esc(m.ID||m.Title||'')+'" onclick="attachPhoto(this.dataset.ctx,this.dataset.id)" style="font-size:10px;color:var(--teal);padding:4px 8px;border-radius:6px;background:rgba(38,198,184,.1);border:1px solid rgba(38,198,184,.2);white-space:nowrap;flex-shrink:0;margin-left:8px">'+
      (hasPhoto?'View photo':'+ Photo')+'</button>'+
      '</div>'+
      (hasPhoto?'<img src="'+esc(m.PhotoUrl)+'" style="width:100%;border-radius:8px;margin-top:10px;max-height:220px;object-fit:cover"/>':'')+
      '</div>';
  }).join('')+'</div>';
}
async function searchMemories(q) {
  if (!q.trim()) { loadMemories(); return; }
  var d = await api('getMemories',{q:q});
  renderMemList(Array.isArray(d)?d:[]);
}
function openAddMemory(prefill) {
  var p = prefill || {};
  var html = '<div class="sheet-title">Add memory</div>';
  html += '<div class="form-row"><label>Title</label><input type="text" id="inp-mem-title" placeholder="What happened?" value="'+esc(p.title||'')+'"/></div>';
  html += '<div class="form-row"><label>Description</label><textarea id="inp-mem-desc" rows="3" placeholder="Tell the story...">'+esc(p.desc||'')+'</textarea></div>';
  html += '<div class="form-row"><label>Date</label><input type="date" id="inp-mem-date" value="'+(p.date||isoToday())+'"/></div>';
  html += '<div class="form-row"><label>Photo (optional)</label>';
  html += '<div style="display:flex;gap:8px;margin-top:4px">';
  html += '<button onclick="triggerCamera("mem-photo")" style="flex:1;padding:11px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);font-size:13px;color:var(--teal)">&#x1F4F7; Camera</button>';
  html += '<button onclick="triggerGallery("mem-photo")" style="flex:1;padding:11px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);font-size:13px;color:var(--accent)">&#x1F5BC;&#xFE0F; Gallery</button>';
  html += '</div>';
  html += '<input type="file" id="mem-photo" accept="image/*" style="display:none" onchange="previewPhoto("mem-photo-preview",this)"/>';
  html += '<img id="mem-photo-preview" style="width:100%;border-radius:8px;margin-top:8px;display:none;max-height:180px;object-fit:cover"/>';
  html += '</div>';
  html += '<div class="form-row"><label>Tags</label><input type="text" id="inp-mem-tags" placeholder="family, trip, milestone..."/></div>';
  html += '<button class="btn-primary" onclick="submitMemory()">Save memory</button>';
  document.getElementById('sheet-inner').innerHTML = html;
  openSheet();
}
async function submitMemory() {
  var title = document.getElementById('inp-mem-title').value.trim();
  if (!title) { showToast('Enter a title'); return; }
  var photoFile = document.getElementById('mem-photo');
  var photoData = null;
  if (photoFile && photoFile.files && photoFile.files[0]) {
    photoData = await fileToBase64(photoFile.files[0]);
  }
  var r = await apiPost('addMemory', {
    title: title,
    description: document.getElementById('inp-mem-desc').value,
    date: document.getElementById('inp-mem-date').value,
    tags: document.getElementById('inp-mem-tags').value,
    photoData: photoData,
    source: 'manual'
  });
  if (r && r.ok) { closeSheet(); showToast('Memory saved!'); loadMemories(); }
}
function quickMemory(text, source) {
  openAddMemory({title: text, desc: '', date: isoToday(), source: source});
}

// PHOTO ATTACHMENT
function triggerCamera(inputId) {
  var inp = document.getElementById(inputId);
  if (!inp) return;
  inp.setAttribute('capture', 'environment');
  inp.accept = 'image/*';
  inp.click();
}
function triggerGallery(inputId) {
  var inp = document.getElementById(inputId);
  if (!inp) return;
  inp.removeAttribute('capture');
  inp.accept = 'image/*';
  inp.click();
}
function previewPhoto(previewId, input) {
  var preview = document.getElementById(previewId);
  if (!preview || !input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    preview.src = e.target.result;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(input.files[0]);
}
function fileToBase64(file) {
  return new Promise(function(resolve) {
    var reader = new FileReader();
    reader.onload = function(e) { resolve(e.target.result); };
    reader.readAsDataURL(file);
  });
}
function attachPhoto(context, id) {
  var html = '<div class="sheet-title">Add photo</div>';
  html += '<div style="margin-bottom:14px;font-size:13px;color:var(--muted)">Attach a photo to this '+context+' entry. It will be saved to Google Drive and linked here.</div>';
  html += '<div style="display:flex;gap:8px;margin-bottom:12px">';
  html += '<button onclick="triggerCamera("attach-photo")" style="flex:1;padding:14px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);font-size:14px;color:var(--teal)">&#x1F4F7;<br><span style="font-size:11px">Camera</span></button>';
  html += '<button onclick="triggerGallery("attach-photo")" style="flex:1;padding:14px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);font-size:14px;color:var(--accent)">&#x1F5BC;&#xFE0F;<br><span style="font-size:11px">Gallery</span></button>';
  html += '</div>';
  html += '<input type="file" id="attach-photo" accept="image/*" style="display:none" onchange="previewPhoto("attach-preview",this)"/>';
  html += '<img id="attach-preview" style="width:100%;border-radius:8px;margin-bottom:12px;display:none;max-height:220px;object-fit:cover"/>';
  html += '<div class="form-row"><label>Caption (optional)</label><input type="text" id="attach-caption" placeholder="What is this?"/></div>';
  html += '<button class="btn-primary" data-ctx="'+context+'" data-id="'+id+'" onclick="submitAttachPhoto(this.dataset.ctx,this.dataset.id)">Upload photo</button>';
  document.getElementById('sheet-inner').innerHTML = html;
  openSheet();
}
async function submitAttachPhoto(context, id) {
  var photoFile = document.getElementById('attach-photo');
  if (!photoFile || !photoFile.files || !photoFile.files[0]) { showToast('Select a photo first'); return; }
  showToast('Uploading...');
  var photoData = await fileToBase64(photoFile.files[0]);
  var r = await apiPost('attachPhoto', {
    context: context, refId: id,
    photoData: photoData,
    caption: document.getElementById('attach-caption').value
  });
  if (r && r.ok) {
    closeSheet();
    showToast('Photo saved! URL: '+(r.url||''));
    if (context==='journal') loadJournal();
    if (context==='memory') loadMemories();
  } else {
    showToast('Upload failed - check Drive permissions');
  }
}
