<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0d0f18"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Life OS</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0f18;--bg2:#141720;--bg3:#1a1e2e;--card:#1c2030;--card2:#222840;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#eef0f8;--muted:#8890b0;--faint:#404568;
  --accent:#5b8af0;--accent2:#3d6ee8;
  --green:#2ecc8a;--amber:#f5a623;--red:#f0605a;--orange:#f97316;--purple:#9b72f0;--teal:#26c6b8;
  --font:'DM Sans',sans-serif;--serif:'DM Serif Display',serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  --nav:62px;--r:14px;--rs:9px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:var(--font);color:var(--text);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);padding:11px 14px;font-size:14px;width:100%;outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
select option{background:var(--bg2)}
textarea{resize:none;line-height:1.6}
::-webkit-scrollbar{width:0;height:0}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
#screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav) + var(--safe-bot) + 16px);display:none;animation:fadeUp .2s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page-header{padding:18px 18px 6px;position:sticky;top:0;z-index:10;background:var(--bg)}
.page-header h1{font-family:var(--serif);font-size:25px;font-weight:400}
.page-header .sub{color:var(--muted);font-size:12px;margin-top:2px}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
#nav{height:calc(var(--nav) + var(--safe-bot));padding-bottom:var(--safe-bot);display:flex;background:rgba(13,15,24,.96);backdrop-filter:blur(24px);border-top:1px solid var(--border);z-index:100;flex-shrink:0}
.nav-btn.active#nav-today{color:#5b8af0}
.nav-btn.active#nav-tasks{color:#2ecc8a}
.nav-btn.active#nav-goals{color:#f5a623}
.nav-btn.active#nav-finance{color:#26c6b8}
.nav-btn.active#nav-calendar{color:#e8609a}
.nav-btn.active#nav-journal{color:#9b72f0}
.nav-btn.active#nav-more{color:#f97316}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--faint);font-size:9px;letter-spacing:.4px;text-transform:uppercase;font-weight:500;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin:0 14px 10px}
.card-sm{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:12px 14px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 14px 10px}
.stat-card{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:14px}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:500;margin-bottom:3px}
.stat-val{font-size:22px;font-weight:600;line-height:1}
.g{color:var(--green)}.r{color:var(--red)}.ac{color:var(--accent)}.pu{color:var(--purple)}.or{color:var(--orange)}.am{color:var(--amber)}
.sec-title{padding:14px 18px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600}
.tabs{display:flex;gap:6px;padding:6px 14px 12px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;background:var(--card);border:1px solid var(--border);color:var(--muted);white-space:nowrap;transition:all .15s}
.tab.active{background:rgba(91,138,240,.18);color:var(--accent);border-color:rgba(91,138,240,.35)}
/* Tasks */
.task-list{display:flex;flex-direction:column;gap:7px;padding:0 14px}
.task-item{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);display:flex;align-items:flex-start;gap:11px;padding:12px 14px;transition:opacity .3s;animation:fadeUp .2s ease}
.task-item.done{opacity:.35}
.task-item.done .task-title{text-decoration:line-through}
.task-item.ov1{border-left:3px solid var(--amber)}
.task-item.ov3{border-left:3px solid var(--orange)}
.task-item.ov7{border-left:3px solid var(--red);background:rgba(240,96,90,.06)}
.ob{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;display:inline-block;margin-bottom:3px}
.ob1{background:rgba(245,166,35,.15);color:var(--amber)}
.ob3{background:rgba(249,115,22,.15);color:var(--orange)}
.ob7{background:rgba(240,96,90,.18);color:var(--red)}
.check-btn{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;margin-top:2px}
.check-btn.chk{background:var(--green);border-color:var(--green)}
.check-btn svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .12s}
.check-btn.chk svg{opacity:1}
.task-body{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{font-size:11px;color:var(--muted);margin-top:2px}
.prio-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.p1{background:var(--red)}.p2{background:var(--orange)}.p3{background:var(--amber)}.p4{background:var(--accent)}.p5{background:var(--faint)}
.prog-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent2),var(--teal));transition:width .5s ease}
/* Goals */
.goal-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin:0 14px 10px;animation:fadeUp .2s ease}
.subtask-list{margin-top:12px;display:flex;flex-direction:column;gap:5px}
.subtask-item{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--bg3);border-radius:8px;font-size:13px}
.subtask-item.done{opacity:.4}.subtask-item.done span{text-decoration:line-through}
/* Finance */
.fin-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.fin-row:last-child{border-bottom:none}
.fin-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.fin-body{flex:1;min-width:0}
.fin-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fin-cat{font-size:11px;color:var(--muted);margin-top:1px}
.fin-amt{font-size:14px;font-weight:600;white-space:nowrap}
.inc{color:var(--green)}.exp{color:var(--red)}
/* Stock P&L cards */
.pl-row{display:flex;gap:8px;padding:0 14px;margin-bottom:10px}
.pl-card{border-radius:var(--rs);border:1px solid var(--border);padding:12px;flex:1;text-align:center}
.pl-profit{background:rgba(46,204,138,.08);border-color:rgba(46,204,138,.22)}
.pl-loss{background:rgba(240,96,90,.08);border-color:rgba(240,96,90,.22)}
.pl-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.pl-val{font-size:17px;font-weight:700}
/* Stocks */
.stock-row{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:14px;margin-bottom:8px}
.stock-detail{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.stock-detail-item{font-size:11px;color:var(--muted)}
.stock-detail-item span{color:var(--text);font-weight:500}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500}
.bg{background:rgba(46,204,138,.12);color:var(--green);border:1px solid rgba(46,204,138,.2)}
.ba{background:rgba(245,166,35,.12);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.bl{background:rgba(91,138,240,.15);color:var(--accent);border:1px solid rgba(91,138,240,.25)}
/* Overdue strip */
.ov-strip{margin:0 14px 10px;background:rgba(240,96,90,.09);border:1px solid rgba(240,96,90,.22);border-radius:var(--rs);padding:10px 14px}
.ov-title{font-size:12px;font-weight:600;color:var(--red);margin-bottom:4px}
.ov-item{font-size:12px;color:var(--muted);padding:2px 0}
/* Today banner */
.today-banner{margin:0 14px 14px;background:linear-gradient(135deg,rgba(61,110,232,.22),rgba(38,198,184,.12));border:1px solid rgba(91,138,240,.22);border-radius:var(--r);padding:18px}
.today-greeting{font-family:var(--serif);font-size:22px;margin-top:3px}
/* Accounts */
.acc-card{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:14px 16px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
/* Journal */
.journal-entry{background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:14px;margin-bottom:8px}
.journal-time{font-size:11px;color:var(--muted);margin-bottom:5px}
.journal-text{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
/* Settings */
.settings-section{background:var(--card);border-radius:var(--r);border:1px solid var(--border);margin:0 14px 10px;overflow:hidden}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:14px;font-weight:500}
.settings-sub{font-size:11px;color:var(--muted);margin-top:2px}
/* FAB */
.wod-card{margin:0 14px 10px;background:linear-gradient(135deg,rgba(155,114,240,.15),rgba(91,138,240,.08));border:1px solid rgba(155,114,240,.25);border-radius:var(--r);padding:14px}
.wod-word{font-family:var(--serif);font-size:20px;color:var(--purple);margin-bottom:2px}
.wod-pos{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.wod-def{font-size:13px;line-height:1.6;margin-bottom:5px}
.wod-ex{font-size:12px;color:var(--muted);font-style:italic;border-left:2px solid var(--purple);padding-left:8px}
#fab{position:fixed;bottom:calc(var(--nav) + var(--safe-bot) + 14px);right:17px;width:50px;height:50px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center;z-index:200;box-shadow:0 4px 20px rgba(61,110,232,.4);transition:transform .13s}
#fab:active{transform:scale(.9)}
#fab svg{width:21px;height:21px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* Search bar */
.search-bar{display:flex;align-items:center;gap:10px;margin:0 14px 10px;background:var(--card);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 14px}
.search-bar svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.search-bar input{background:none;border:none;outline:none;font-size:14px;flex:1;padding:0;color:var(--text)}
/* Bottom sheet */
#sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(3px)}
#sheet-overlay.open{opacity:1;pointer-events:auto}
#bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:18px 18px 0 0;z-index:400;padding:10px 18px 18px;padding-bottom:calc(18px + var(--safe-bot));max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1)}
#bottom-sheet.open{transform:translateY(0)}
.sheet-handle{width:34px;height:4px;background:var(--faint);border-radius:2px;margin:0 auto 16px}
.sheet-title{font-size:16px;font-weight:600;margin-bottom:16px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.btn-primary{width:100%;padding:14px;border-radius:var(--rs);background:var(--accent2);color:#fff;font-size:15px;font-weight:600;text-align:center;transition:opacity .13s;margin-top:4px}
.btn-primary:active{opacity:.8}
.btn-ghost{width:100%;padding:13px;border-radius:var(--rs);background:var(--bg3);color:var(--text);font-size:14px;font-weight:500;text-align:center;border:1px solid var(--border2);margin-top:8px}
.btn-seg{flex:1;padding:9px;border-radius:8px;background:var(--bg3);color:var(--muted);font-size:13px;font-weight:500;text-align:center;transition:all .13s;border:1px solid var(--border)}
.btn-seg.active{background:rgba(91,138,240,.18);color:var(--accent);border-color:rgba(91,138,240,.35)}
.seg-row{display:flex;gap:8px;margin-bottom:12px}
.date-quick{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.date-chip{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;background:var(--bg3);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .13s}
.date-chip.sel{background:rgba(91,138,240,.18);color:var(--accent);border-color:rgba(91,138,240,.35)}
/* Cat editor */
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.cat-item:last-child{border-bottom:none}
/* Toast */
#toast{position:fixed;top:calc(var(--safe-top)+14px);left:50%;transform:translateX(-50%) translateY(-70px);background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:9px 16px;font-size:13px;font-weight:500;z-index:999;transition:transform .25s ease;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
.spinner{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;margin:24px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:34px;margin-bottom:10px}
.empty-text{font-size:13px;line-height:1.6}

/* Colored nav */
#nav-today.active{color:#5b8af0}
#nav-tasks.active{color:#2ecc8a}
#nav-goals.active{color:#f5a623}
#nav-finance.active{color:#26c6b8}
#nav-calendar.active{color:#e8609a}
#nav-journal.active{color:#9b72f0}
#nav-more.active{color:#f97316}
.nav-btn svg{transition:transform .15s}
.nav-btn.active svg{transform:scale(1.15)}
/* WOD card */
.wod-card{margin:0 14px 10px;background:linear-gradient(135deg,rgba(155,114,240,.15),rgba(91,138,240,.08));border:1px solid rgba(155,114,240,.25);border-radius:var(--r);padding:14px}
.wod-word{font-family:var(--serif,'Georgia'),serif;font-size:20px;color:var(--purple);margin-bottom:2px}
.wod-pos{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.wod-def{font-size:13px;line-height:1.6;margin-bottom:5px}
.wod-ex{font-size:12px;color:var(--muted);font-style:italic;border-left:2px solid var(--purple);padding-left:8px}
/* Micro buttons */
.mbtn{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;cursor:pointer;border:1px solid;display:inline-block;margin-top:4px;margin-right:4px;background:none}
.mbtn-p{color:var(--purple);border-color:rgba(155,114,240,.3);background:rgba(155,114,240,.08)}
.mbtn-t{color:var(--teal);border-color:rgba(38,198,184,.3);background:rgba(38,198,184,.08)}
/* Memory card */
.mem-card{background:var(--card);border-radius:var(--rs);border:1px solid rgba(155,114,240,.2);padding:12px 14px;margin-bottom:7px}
.mem-when{font-size:10px;color:var(--purple);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
/* Task section header */
.tsec{padding:10px 14px 4px;font-size:10px;text-transform:uppercase;letter-spacing:.7px;font-weight:700;display:flex;align-items:center;gap:6px}

</style>
</head>
<body>
<div id="app">
  <div id="screens">
    <div class="screen active" id="screen-today">
      <div class="page-header"><h1>Today</h1><div class="sub" id="today-sub"></div></div>
      <div id="today-content"><div class="spinner"></div></div>
    </div>
    <div class="screen" id="screen-tasks">
      <div class="page-header"><h1>Tasks</h1></div>
      <div class="tabs" id="task-tabs">
        <button class="tab active" onclick="filterTasks('all')">All</button>
        <button class="tab" onclick="filterTasks('todo')">To Do</button>
        <button class="tab" onclick="filterTasks('buy')">To Buy</button>
        <button class="tab" onclick="filterTasks('overdue')">Overdue</button>
        <button class="tab" onclick="filterTasks('today')">Today</button>
        <button class="tab" onclick="filterTasks('week')">This week</button>
        <button class="tab" onclick="filterTasks('done')">Done</button>
      </div>
      <div id="tasks-progress"></div>
      <div id="tasks-content"><div class="spinner"></div></div>
    </div>
    <div class="screen" id="screen-goals">
      <div class="page-header"><h1>Goals</h1><div class="sub">Long-term projects</div></div>
      <div id="goals-content"><div class="spinner"></div></div>
    </div>
    <div class="screen" id="screen-finance">
      <div class="page-header">
        <div class="header-row">
          <h1>Finance</h1>
          <div style="display:flex;gap:4px">
            <button class="tab active" id="fp-day" onclick="setFinPeriod('day')">Day</button>
            <button class="tab" id="fp-week" onclick="setFinPeriod('week')">Week</button>
            <button class="tab" id="fp-month" onclick="setFinPeriod('month')">Month</button>
            <button class="tab" id="fp-year" onclick="setFinPeriod('year')">Year</button>
            <button class="tab" id="fp-all" onclick="setFinPeriod('all')">All</button>
          </div>
        </div>
      </div>
      <div class="tabs" id="fin-tabs">
        <button class="tab active" onclick="finTab('overview')">Overview</button>
        <button class="tab" onclick="finTab('transactions')">Transactions</button>
        <button class="tab" onclick="finTab('accounts')">Accounts</button>
        <button class="tab" onclick="finTab('stocks')">Stocks</button>
        <button class="tab" onclick="finTab('mf')">Mutual funds</button>
      </div>
      <div id="finance-content"><div class="spinner"></div></div>
    </div>
    <div class="screen" id="screen-journal">
      <div class="page-header">
        <div class="header-row">
          <div><h1>Journal</h1><div class="sub">Thoughts &amp; ideas</div></div>
          <button onclick="openAddJournal()" style="width:36px;height:36px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center">
            <svg width="16" height="16" viewBox="0 0 24 24" stroke="#fff" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>
      <div class="search-bar"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search journal..." oninput="searchJournal(this.value)"/></div>
      <div id="journal-content"><div class="spinner"></div></div>
    </div>
    <div class="screen" id="screen-calendar">
      <div class="page-header">
        <div class="header-row">
          <div><h1>Calendar</h1></div>
          <div id="cal-month-label" style="font-size:13px;color:var(--muted)"></div>
        </div>
      </div>
      <div id="calendar-content"><div class="spinner"></div></div>
    </div>

    <div class="screen" id="screen-more">
      <div class="page-header"><h1>Settings</h1></div>
      <div id="more-content"></div>
    </div>
  </div>
  <nav id="nav">
    <button class="nav-btn active" onclick="goto('today')" id="nav-today">

// ── CONFIG & STATE ────────────────────────────────────────────
const CFG={scriptUrl:localStorage.getItem('scriptUrl')||'',vapidKey:localStorage.getItem('vapidKey')||''};
const S={screen:'today',tasks:[],goals:[],finPeriod:'day',finTab:'overview',

// ── API ───────────────────────────────────────────────────────
async function api(action,params={}){
  if(!CFG.scriptUrl){showToast('⚙️ Set Script URL in Settings');return null;}
  try{const r=await fetch(CFG.scriptUrl+'?action='+action+'&'+new URLSearchParams(params));return await r.json();}
  catch(e){showToast('Connection error');return null;}
}
async function apiPost(action,data={}){
  if(!CFG.scriptUrl){showToast('⚙️ Set Script URL in Settings');return null;}
  try{const r=await fetch(CFG.scriptUrl,{method:'POST',body:JSON.stringify({action,data})});return await r.json();}
  catch(e){showToast('Connection error');return null;}
}

// ── NAVIGATION ────────────────────────────────────────────────
function goto(s){
  document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
  document.getElementById('nav-'+s).classList.add('active');
  S.screen=s;
  if(s==='today')loadToday();
  if(s==='tasks')loadTasks();
  if(s==='goals')loadGoals();
  if(s==='finance')loadFinance();
  if(s==='journal')loadJournal();
  if(s==='more')renderSettings();
  if(s==='calendar'){S.calYear=S.calYear||new Date().getFullYear();S.calMonth=(S.calMonth!==undefined?S.calMonth:new Date().getMonth());loadCalendar();}
}

// ── OVERDUE ENGINE ────────────────────────────────────────────
function daysOverdue(t){
  if(t.Status==='Done'||!t.DueDate||t.DueDate==='someday')return 0;
  const due=new Date(t.DueDate),now=new Date();
  now.setHours(0,0,0,0);
  const d=Math.floor((now-due)/86400000);
  return d>0?d:0;
}
function effPrio(t){
  const d=daysOverdue(t),p=Number(t.Priority)||3;
  if(d>=7)return 1;
  if(d>=3)return Math.min(p,2);
  if(d>=1)return Math.min(p,3);
  return p;
}
function ovClass(d){return d>=7?'ov7':d>=3?'ov3':d>=1?'ov1':'';}
function ovLabel(d){
  if(d>=7)return'<span class="ob ob7">🔥 '+d+'d overdue — urgent!</span>';
  if(d>=3)return'<span class="ob ob3">⚠️ '+d+'d overdue</span>';
  if(d>=1)return'<span class="ob ob1">⏰ '+d+'d overdue</span>';
  return'';
}

// ── PIE CHART ─────────────────────────────────────────────────
function buildPie(data,r,cx,cy){
  cx=cx||r+4;cy=cy||r+4;
  const tot=data.reduce((s,d)=>s+d.v,0);
  if(!tot)return{svg:'',legend:[],dim:0};
  let ang=-Math.PI/2,svg='';const legend=[];
  data.forEach((d,i)=>{
    const sl=(d.v/tot)*2*Math.PI;
    const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang);
    ang+=sl;
    const x2=cx+r*Math.cos(ang),y2=cy+r*Math.sin(ang);
    const lg=sl>Math.PI?1:0,c=PIE_COLORS[i%PIE_COLORS.length];
    svg+='<path d="M'+cx+','+cy+' L'+x1.toFixed(1)+','+y1.toFixed(1)+
      ' A'+r+','+r+' 0 '+lg+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+' Z"'+
      ' fill="'+c+'" stroke="var(--bg)" stroke-width="1.5"/>';
    legend.push({label:d.k,v:d.v,color:c,pct:Math.round(d.v/tot*100)});
  });
  const hole=Math.round(r*0.52);
  svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+hole+'" fill="var(--card)"/>';
  return{svg,legend,dim:(r+4)*2};
}

function renderPie(elId,data){
  var el=document.getElementById(elId);if(!el)return;
  const tot=data.reduce((s,d)=>s+d.v,0);
  if(!tot){el.innerHTML='<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">No data for this period</div>';return;}
  const{svg,legend,dim}=buildPie(data,68,72,72);
  const size=144;
  el.innerHTML='<div style="display:flex;gap:14px;align-items:center">'+
    '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" style="flex-shrink:0">'+svg+'</svg>'+
    '<div style="flex:1">'+
    legend.map(l=>'<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">'+
      '<div style="width:8px;height:8px;border-radius:50%;background:'+l.color+';flex-shrink:0"></div>'+
      '<div style="flex:1;font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(l.label)+'</div>'+
      '<div style="font-size:11px;font-weight:600;white-space:nowrap">&#8377;'+fmt(l.v)+
      ' <span style="color:var(--muted);font-weight:400">'+l.pct+'%</span></div></div>').join('')+
    '<div style="border-top:1px solid var(--border);padding-top:6px;margin-top:2px;font-size:11px;font-weight:600">Total: &#8377;'+fmt(tot)+'</div>'+
    '</div></div>';
}

// ── TODAY ─────────────────────────────────────────────────────
async function loadToday(){
  const now=new Date();
  const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dateStr=DAYS[now.getDay()]+', '+now.getDate()+' '+MONTHS[now.getMonth()]+' '+now.getFullYear();
  document.getElementById('today-sub').textContent=dateStr;
  const hr=now.getHours();
  const greet=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  const[data,stats,finDay]=await Promise.all([
    api('getToday'),api('getStats'),api('getFinance',{period:'day'})
  ]);
  var el=document.getElementById('today-content');
  if(!data){el.innerHTML=configPrompt();return;}
  const tasks=data.tasks||[],events=data.events||[],memories=data.memories||[];
  const pct=stats?.pct||0;
  const emoji=pct>=80?'🏆':pct>=50?'💪':pct>=20?'🙂':'😴';
  const ovTasks=tasks.filter(t=>daysOverdue(t)>0);
  const expCats=Object.entries(finDay?.byCategory||{}).map(([k,v])=>({k,v})).sort((a,b)=>b.v-a.v);
  el.innerHTML=
    '<div class="today-banner">'+
    '<div style="font-size:12px;color:var(--muted)">'+dateStr+'</div>'+
    '<div class="today-greeting">'+greet+' \uD83D\uDC4B</div>'+
    '<div style="font-size:12px;color:var(--muted);margin-top:5px">'+tasks.length+' pending \u00B7 '+events.length+' event'+(events.length!==1?'s':'')+' today</div>'+
    '</div>'+

    '<div style="display:flex;gap:8px;padding:0 14px;margin-bottom:10px">'+
    '<div class="stat-card" style="flex:1">'+
    '<div class="stat-label">Tasks done</div>'+
    '<div style="display:flex;align-items:center;gap:8px"><div class="stat-val ac">'+(stats?.done||0)+'</div><div style="font-size:20px">'+emoji+'</div></div>'+
    '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>'+
    '<div style="font-size:10px;color:var(--muted);margin-top:4px">'+pct+'% of '+(stats?.total||0)+' total</div>'+
    '</div>'+
    '<div class="stat-card" style="flex:1">'+
    '<div class="stat-label">Today spent</div>'+
    '<div class="stat-val r">&#8377;'+fmt(finDay?.expense||0)+'</div>'+
    '<div style="font-size:10px;color:var(--green);margin-top:4px">In: &#8377;'+fmt(finDay?.income||0)+'</div>'+
    '</div></div>'+

    (expCats.length?'<div class="sec-title">Today\'s spending</div><div class="card"><div id="today-pie"></div></div>':'')+

    (ovTasks.length?
    '<div class="ov-strip"><div class="ov-title">\uD83D\uDD25 '+ovTasks.length+' overdue task'+(ovTasks.length>1?'s':'')+' \u2014 needs attention</div>'+
    ovTasks.slice(0,3).map(t=>'<div class="ov-item">\u00B7 '+esc(t.Title)+' ('+daysOverdue(t)+'d late)</div>').join('')+
    (ovTasks.length>3?'<div class="ov-item" style="color:var(--accent)">+ '+(ovTasks.length-3)+' more \u2014 see Tasks tab</div>':'')+
    '</div>':'')+

    (memories.length?
    '<div class="sec-title">\uD83C\uDF1F On this day</div>'+
    '<div style="padding:0 14px;margin-bottom:4px">'+
    memories.map(m=>'<div class="card-sm" style="margin-bottom:7px;border-color:rgba(155,114,240,.25)">'+
      '<div style="font-size:12px;color:var(--purple);font-weight:600">'+esc(m.Title)+'</div>'+
      '<div style="font-size:11px;color:var(--muted);margin-top:2px">'+formatDate(m.Date)+
      (m.Description?' \u00B7 '+esc(m.Description):'')+
      '</div></div>').join('')+'</div>':'')+

    (events.length?
    '<div class="sec-title">Today\'s events</div>'+
    '<div style="padding:0 14px;margin-bottom:4px">'+
    events.map(e=>'<div class="card-sm" style="margin-bottom:7px">'+
      '<div style="font-size:13px;font-weight:600;color:var(--amber)">\uD83D\uDCC5 '+esc(e.Title)+'</div>'+
      '<div style="font-size:11px;color:var(--muted);margin-top:2px">'+esc(e.Notes||e.Type||'')+'</div>'+
      '</div>').join('')+'</div>':'')+

    '<div class="sec-title">Today\'s priorities</div>'+
    '<div class="task-list">'+
    (tasks.slice(0,8).map(t=>taskItem(t,true)).join('')||
    '<div class="empty"><div class="empty-icon">\u2705</div><div class="empty-text">All clear! Tap + to add tasks.</div></div>')+
    '</div>'+
    '<div style="padding:0 14px;margin-top:10px"><button class="btn-ghost" onclick="openNightLog()">\uD83C\uDF19 Log today\'s summary</button></div>';

  if(expCats.length)renderPie('today-pie',expCats);
}

// ── TASKS ─────────────────────────────────────────────────────
async function loadTasks(){
  const d=await api('getTasks');
  if(!d)return;
  S.tasks=Array.isArray(d)?d:[];
  renderTasks();
}
function filterTasks(f){
  S.taskFilter=f;
  var L=['all','todo','buy','overdue','today','week','done'];
  document.querySelectorAll('#task-tabs .tab').forEach(function(t,i){t.classList.toggle('active',L[i]===f);});
  renderTasks();
}
function renderTasks(){
  var ts=isoToday(),ws=isoAdd(7);
  var q=(document.getElementById('task-search')?document.getElementById('task-search').value.toLowerCase():'');
  var list=S.tasks;
  if(S.taskFilter==='todo')list=list.filter(function(t){return t.Status!=='Done'&&t.SubType!=='buy';});
  else if(S.taskFilter==='buy')list=list.filter(function(t){return t.Status!=='Done'&&t.SubType==='buy';});
  else if(S.taskFilter==='overdue')list=list.filter(function(t){return t.Status!=='Done'&&daysOverdue(t)>0;});
  else if(S.taskFilter==='today')list=list.filter(function(t){return t.Status!=='Done'&&String(t.DueDate).slice(0,10)===ts;});
  else if(S.taskFilter==='week')list=list.filter(function(t){return t.Status!=='Done'&&t.DueDate&&t.DueDate<=ws;});
  else if(S.taskFilter==='done')list=list.filter(function(t){return t.Status==='Done';});
  else list=list.filter(function(t){return t.Status!=='Done';});
  if(q)list=list.filter(function(t){return(t.Title||'').toLowerCase().indexOf(q)!==-1;});
  if(S.taskFilter!=='done')list=list.slice().sort(function(a,b){return effPrio(a)-effPrio(b);});
  var done=S.tasks.filter(function(t){return t.Status==='Done';}).length;
  var total=S.tasks.length,pct=total?Math.round(done/total*100):0;
  var oc=S.tasks.filter(function(t){return t.Status!=='Done'&&daysOverdue(t)>0;}).length;
  var r28=2*Math.PI*28;
  document.getElementById('tasks-progress').innerHTML=total?
    '<div style="display:flex;align-items:center;gap:14px;padding:0 14px;margin-bottom:10px">'+
    '<div style="position:relative;width:64px;height:64px;flex-shrink:0">'+
    '<svg width="64" height="64" viewBox="0 0 68 68">'+
    '<circle cx="34" cy="34" r="28" fill="none" stroke="var(--bg3)" stroke-width="6"/>'+
    '<circle cx="34" cy="34" r="28" fill="none" stroke="var(--green)" stroke-width="6"'+
    ' stroke-dasharray="'+r28.toFixed(1)+'" stroke-dashoffset="'+(r28*(1-pct/100)).toFixed(1)+'"'+
    ' stroke-linecap="round" transform="rotate(-90 34 34)"/></svg>'+
    '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--green)">'+pct+'%</div>'+
    '</div><div><div style="font-size:13px;font-weight:500">'+done+'/'+total+' done</div>'+
    (oc?'<div style="font-size:11px;color:var(--red);margin-top:2px">'+oc+' overdue</div>':'')+
    '</div></div>':'';
  var thtml='';
  if(S.taskFilter==='all'){
    var todos=list.filter(function(t){return t.SubType!=='buy';});
    var buys=list.filter(function(t){return t.SubType==='buy';});
    if(todos.length){thtml+='<div class="tsec" style="color:var(--accent)">&#x2705; To Do ('+todos.length+')</div><div class="task-list">'+todos.map(function(t){return taskItem(t,false);}).join('')+'</div>';}
    if(buys.length){thtml+='<div class="tsec" style="color:var(--teal)">&#x1F6D2; To Buy ('+buys.length+')</div><div class="task-list">'+buys.map(function(t){return taskItem(t,false);}).join('')+'</div>';}
    if(!todos.length&&!buys.length)thtml='<div class="empty"><div class="empty-icon">&#x2705;</div><div class="empty-text">All done! Tap + to add.</div></div>';
  }else{
    thtml=list.length?'<div class="task-list">'+list.map(function(t){return taskItem(t,false);}).join('')+'</div>':
      '<div class="empty"><div class="empty-icon">&#x1F4CB;</div><div class="empty-text">'+(S.taskFilter==='overdue'?'No overdue tasks!':'Nothing here.')+'</div></div>';
  }
  document.getElementById('tasks-content').innerHTML=thtml;
}
function taskItem(t,compact){
  var done=t.Status==='Done',days=done?0:daysOverdue(t);
  var prio=done?(Number(t.Priority)||3):effPrio(t);
  var due=(t.DueDate&&t.DueDate!=='someday')?'Due '+formatDate(t.DueDate):(t.DueDate==='someday'?'Someday':'');
  var oc=ovClass(days),isBuy=t.SubType==='buy';
  var title=esc(t.Title||'');
  var timeTag=(t.RemindTime&&!compact)?'<span style="font-size:10px;color:var(--amber);margin-left:6px">&#x1F514; '+esc(t.RemindTime)+'</span>':'';
  var memBtn=!compact?'<button class="mbtn mbtn-p" data-title="'+title+'" data-src="task" onclick="quickMemory(this.dataset.title,this.dataset.src)">+ Memory</button>':'';
  return'<div class="task-item'+(done?' done':'')+(oc?' '+oc:'')+'" style="'+(isBuy?'border-left:3px solid var(--teal);':'')+'" id="ti-'+t.ID+'">'+
    '<div class="check-btn'+(done?' chk':'')+'" data-id="'+t.ID+'" data-ns="'+(done?'Pending':'Done')+'" onclick="toggleTask(this.dataset.id,this.dataset.ns)">'+
    '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>'+
    '<div class="task-body">'+
    (days&&!done?ovLabel(days):'')+
    '<div class="task-title">'+(isBuy?'<span style="margin-right:4px">&#x1F6D2;</span>':'')+title+'</div>'+
    (!compact&&(due||timeTag)?'<div class="task-meta">'+due+timeTag+(t.GoalID?'<span class="badge bl" style="margin-left:4px">Goal</span>':'')+'</div>':'')+
    memBtn+
    '</div><div class="prio-dot p'+prio+'"></div></div>';
}
async function toggleTask(id,ns){
  var el=document.getElementById('ti-'+id);if(el)el.style.opacity='.4';
  const r=await apiPost('updateTask',{id,Status:ns});
  if(r?.ok){const t=S.tasks.find(x=>x.ID===id);if(t)t.Status=ns;
    showToast(ns==='Done'?'✅ Done!':'↩️ Reopened');renderTasks();
    if(S.screen==='today')loadToday();}
}

// ── GOALS ─────────────────────────────────────────────────────
async function loadGoals(){
  const d=await api('getGoals');var el=document.getElementById('goals-content');
  if(!d||!d.length){el.innerHTML='<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">No goals yet. Tap + to add your first.</div></div>';return;}
  S.goals=d;
  el.innerHTML=d.map(g=>
    '<div class="goal-card">'+
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">'+
    '<div style="flex:1;min-width:0">'+
    '<div style="font-size:15px;font-weight:600;margin-bottom:3px">'+esc(g.Title||'')+'</div>'+
    (g.Description?'<div style="font-size:12px;color:var(--muted);margin-bottom:10px">'+esc(g.Description)+'</div>':'')+
    '</div><span class="badge '+(g.Status==='Active'?'bg':'ba')+'">'+( g.Status||'Active')+'</span></div>'+
    (g.TargetDate&&g.TargetDate!=='someday'?'<div style="font-size:11px;color:var(--muted);margin-bottom:8px">Target: '+formatDate(g.TargetDate)+'</div>':'')+

async function loadFinance(){
  const[fd,cats,accs,stocks,mf]=await Promise.all([
    api('getFinance',{period:S.finPeriod}),
    api('getCategories'),api('getAccounts'),api('getStocks'),api('getMutualFunds')
  ]);
  S.finance=fd;S.accounts=accs||[];S.stocks=stocks||[];S.mf=mf||[];
  if(cats)S.categories=cats;
  renderFinTab();
}
function setFinPeriod(p){
  S.finPeriod=p;
  ['day','week','month','year','all'].forEach(x=>document.getElementById('fp-'+x)?.classList.toggle('active',x===p));
  api('getFinance',{period:p}).then(d=>{S.finance=d;renderFinTab();});
}
function finTab(t){
  S.finTab=t;
  const L=['overview','transactions','accounts','stocks','mf'];
  document.querySelectorAll('#fin-tabs .tab').forEach((b,i)=>b.classList.toggle('active',L[i]===t));
  renderFinTab();
}
function renderFinTab(){
  if(S.finTab==='overview')renderFinOverview();
  else if(S.finTab==='transactions')renderFinTrans();
  else if(S.finTab==='accounts')renderFinAccs();
  else if(S.finTab==='stocks')renderFinStocks();
  else if(S.finTab==='mf')renderFinMF();
}

function plCard(label,val){
  const prof=val>=0;
  return'<div class="pl-card '+(prof?'pl-profit':'pl-loss')+'">'+
    '<div class="pl-label">'+label+'</div>'+
    '<div class="pl-val" style="color:'+(prof?'var(--green)':'var(--red)')+'">'+
    (prof?'+':'')+'\u20B9'+fmt(Math.abs(val))+'</div>'+
    '<div style="font-size:10px;margin-top:3px;color:'+(prof?'var(--green)':'var(--red)')+'">'+
    (prof?'\u25B2':'\u25BC')+' '+(prof?'Profit':'Loss')+'</div>'+
    '</div>';
}

function renderFinOverview(){
  const d=S.finance||{};
  const shortPL=S.stocks.filter(s=>s.Term==='short').reduce((s,st)=>s+Number(st.pl||0),0);
  const longPL=S.stocks.filter(s=>s.Term==='long').reduce((s,st)=>s+Number(st.pl||0),0);
  const netPL=shortPL+longPL;
  const nw=S.accounts.reduce((s,a)=>s+Number(a.Balance||0),0);
  const expData=Object.entries(d.byCategory||{}).map(([k,v])=>({k,v})).sort((a,b)=>b.v-a.v);
  const incRows=(d.rows||[]).filter(r=>r.Type==='Income');
  const incMap={};incRows.forEach(r=>{incMap[r.Category||'Other']=(incMap[r.Category||'Other']||0)+Number(r.Amount);});
  const incData=Object.entries(incMap).map(([k,v])=>({k,v})).sort((a,b)=>b.v-a.v);
  const bal=Number(d.balance||0);
  document.getElementById('finance-content').innerHTML=
    '<div class="stat-grid">'+
    '<div class="stat-card"><div class="stat-label">Income</div><div class="stat-val g">\u20B9'+fmt(d.income||0)+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Expenses</div><div class="stat-val r">\u20B9'+fmt(d.expense||0)+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Balance</div><div class="stat-val '+(bal>=0?'ac':'r')+'">\u20B9'+fmt(bal)+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Net worth</div><div class="stat-val pu">\u20B9'+fmt(nw)+'</div></div>'+
    '</div>'+
    '<div class="sec-title">Stock portfolio P&amp;L</div>'+
    '<div class="pl-row">'+plCard('Short term',shortPL)+plCard('Long term',longPL)+plCard('Net portfolio',netPL)+'</div>'+
    (expData.length?'<div class="sec-title">Expenses by category</div><div class="card"><div id="exp-pie"></div></div>':'')+
    (incData.length?'<div class="sec-title">Income by category</div><div class="card"><div id="inc-pie"></div></div>':'')+
    '<div style="height:10px"></div>';
  if(expData.length)renderPie('exp-pie',expData);
  if(incData.length)renderPie('inc-pie',incData);
}

function setDue(el,v){
  document.querySelectorAll('#bottom-sheet .date-chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');const i=document.getElementById('inp-due');
  if(v==='pick'){i.style.display='block';i.focus();return;}
  i.style.display='none';_due=v;
}
async function submitTask(gid) {
  var t=document.getElementById('inp-title').value.trim();
  if(!t){showToast('Enter a title');return;}
  var dp=document.getElementById('inp-due')?document.getElementById('inp-due').value:'';
  var rt=document.getElementById('inp-rtime')?document.getElementById('inp-rtime').value:'';
  var r=await apiPost('addTask',{title:t,priority:document.getElementById('inp-prio').value,dueDate:dp||_due,notes:document.getElementById('inp-notes').value,type:gid?'subtask':'simple',goalId:gid||'',subType:_subtype||'todo',remindTime:rt});
  if(r&&r.ok){closeSheet();showToast('Added!');_due='';loadTasks();loadToday();if(gid)loadGoals();}
}

// WORD OF THE DAY
var WOD_WORDS=['ephemeral','serendipity','melancholy','resilience','perseverance','eloquent','cognizant','pragmatic','diligent','prudent','tenacious','introspect','catalyst','momentum','solitude','equanimity','ameliorate','sanguine','laconic','felicity','sagacious','indefatigable','perspicacity','ebullient','auspicious','benevolent','candid','empathy','fortitude','gratitude'];
async function loadWordOfDay(){
  var today=isoToday();
  if(localStorage.getItem('wod_date')===today){try{return JSON.parse(localStorage.getItem('wod_data'));}catch(e){}}
  try{
    var w=WOD_WORDS[new Date().getDate()%WOD_WORDS.length];
    var resp=await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+w);
    var d=await resp.json();
    if(d&&d[0]){
      var entry=d[0],meaning=entry.meanings&&entry.meanings[0],def2=meaning&&meaning.definitions&&meaning.definitions[0];
      var wod={word:entry.word,pos:meaning?meaning.partOfSpeech:'',definition:def2?def2.definition:'',example:def2&&def2.example?def2.example:''};
      localStorage.setItem('wod_date',today);localStorage.setItem('wod_data',JSON.stringify(wod));
      return wod;
    }
  }catch(e){}
  return null;
}
function saveWOD(word,def){
  var dict=JSON.parse(localStorage.getItem('lifeos_dict')||'[]');
  if(!dict.find(function(w){return w.word===word;})){dict.push({word:word,def:def,added:isoToday(),nextReview:isoAdd(3)});localStorage.setItem('lifeos_dict',JSON.stringify(dict));showToast('Saved to dictionary!');}
  else showToast('Already saved');
}
function openDictionary(){
  var dict=JSON.parse(localStorage.getItem('lifeos_dict')||'[]'),today=isoToday();
  var due=dict.filter(function(w){return w.nextReview<=today;});
  var h='<div class="sheet-title">My Dictionary ('+dict.length+' words)</div>';
  if(due.length){
    h+='<div style="background:rgba(155,114,240,.1);border:1px solid rgba(155,114,240,.2);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--purple);font-weight:500">'+due.length+' word'+(due.length>1?'s':'')+' due for review</div>';
    due.slice(0,3).forEach(function(w){h+='<div style="background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:8px"><div style="font-size:15px;font-weight:600;color:var(--purple)">'+esc(w.word)+'</div><div style="font-size:12px;color:var(--muted);margin-top:4px">'+esc(w.def)+'</div><button data-word="'+esc(w.word)+'" onclick="markReviewed(this.dataset.word)" style="margin-top:8px;padding:6px 12px;border-radius:6px;background:var(--accent2);color:#fff;font-size:12px;font-weight:600">Got it - review in 1 week</button></div>';});
  }
  if(dict.length){h+='<div style="max-height:200px;overflow-y:auto;background:var(--bg3);border-radius:8px">'+dict.map(function(w){return'<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border)"><div style="font-size:13px;font-weight:500">'+esc(w.word)+'</div><span style="font-size:10px;color:var(--muted)">Review: '+formatDate(w.nextReview)+'</span></div>';}).join('')+'</div>';}
  else h+='<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">No words yet. Save from Today tab.</div>';
  document.getElementById('sheet-inner').innerHTML=h;openSheet();
}
function markReviewed(word){
  var dict=JSON.parse(localStorage.getItem('lifeos_dict')||'[]');
  dict=dict.map(function(w){if(w.word===word)w.nextReview=isoAdd(7);return w;});
  localStorage.setItem('lifeos_dict',JSON.stringify(dict));showToast('Marked reviewed!');openDictionary();
}
// CALENDAR
var EV_COLORS=['#5b8af0','#2ecc8a','#f5a623','#e8609a','#26c6b8','#9b72f0','#f0605a'];
async function loadCalendar(){
  var r=await api('getEvents');S.calEvents=Array.isArray(r)?r:[];renderCalendar();
}
function renderCalendar(){
  var y=S.calYear||new Date().getFullYear(),m=S.calMonth||0;
  var MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var DN=['S','M','T','W','T','F','S'];
  var lbl=document.getElementById('cal-month-label');if(lbl)lbl.textContent=MN[m]+' '+y;
  var first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),ts=isoToday();
  var evD={};(S.calEvents||[]).forEach(function(e){var d=String(e.Date||'').slice(0,10);if(d)evD[d]=(evD[d]||0)+1;});
  var h='<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 14px 10px"><button onclick="calNav(-1)" style="padding:8px 16px;border-radius:8px;background:var(--card);border:1px solid var(--border);font-size:15px;color:var(--text)">&#8249;</button><b style="font-size:14px">'+MN[m]+' '+y+'</b><button onclick="calNav(1)" style="padding:8px 16px;border-radius:8px;background:var(--card);border:1px solid var(--border);font-size:15px;color:var(--text)">&#8250;</button></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 14px">';
  DN.forEach(function(d){h+='<div style="font-size:10px;text-align:center;color:var(--muted);font-weight:600;padding:6px 0">'+d+'</div>';});
  for(var i=0;i<first;i++)h+='<div></div>';
  for(var d2=1;d2<=dim;d2++){
    var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d2).padStart(2,'0');
    var isT=ds===ts,hasE=evD[ds]>0;
    h+='<div data-ds="'+ds+'" onclick="calDayClick(this.dataset.ds)" style="aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:13px;cursor:pointer;position:relative;'+(isT?'background:var(--accent2);color:#fff;font-weight:700;':'')+'">'+ d2;
    if(hasE)h+='<div style="width:4px;height:4px;border-radius:50%;position:absolute;bottom:3px;background:'+(isT?'rgba(255,255,255,.8)':'var(--amber)')+'"></div>';
    h+='</div>';
  }
  h+='</div>';
  var mp=y+'-'+String(m+1).padStart(2,'0');
  var mev=(S.calEvents||[]).filter(function(e){return String(e.Date||'').slice(0,7)===mp;}).sort(function(a,b){return String(a.Date).localeCompare(String(b.Date));});
  if(mev.length){
    h+='<div class="sec-title">Events this month</div><div style="padding:0 14px">';
    mev.forEach(function(e,i){
      h+='<div style="background:var(--card);border-radius:var(--rs);border:1px solid var(--border);padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px">';
      h+='<div style="width:4px;height:36px;border-radius:2px;background:'+EV_COLORS[i%EV_COLORS.length]+';flex-shrink:0"></div>';
      h+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">'+esc(e.Title)+'</div><div style="font-size:11px;color:var(--muted);margin-top:2px">'+formatDate(e.Date)+(e.Time?' at '+e.Time:'')+(e.Notes?' &middot; '+esc(e.Notes):'')+'</div></div>';
      h+='<button class="mbtn mbtn-p" data-t="'+esc(e.Title)+'" data-d="'+String(e.Date).slice(0,10)+'" onclick="openAddReminder(this.dataset.t,this.dataset.d)">+ Remind</button></div>';
    });
    h+='</div>';
  }
  h+='<div style="padding:0 14px;margin-top:8px"><button class="btn-ghost" onclick="openAddEvent()">+ Add event / birthday / anniversary</button></div>';
  document.getElementById('calendar-content').innerHTML=h;
}
function calNav(dir){
  S.calMonth=(S.calMonth||0)+dir;
  if(S.calMonth>11){S.calMonth=0;S.calYear=(S.calYear||new Date().getFullYear())+1;}
  if(S.calMonth<0){S.calMonth=11;S.calYear=(S.calYear||new Date().getFullYear())-1;}
  renderCalendar();
}
function calDayClick(ds){
  var evs=(S.calEvents||[]).filter(function(e){return String(e.Date||'').slice(0,10)===ds;});
  if(!evs.length){openAddEventOnDate(ds);return;}
  var h='<div class="sheet-title">'+formatDate(ds)+'</div>';
  evs.forEach(function(e,i){h+='<div style="background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:8px;border-left:3px solid '+EV_COLORS[i%EV_COLORS.length]+'"><div style="font-size:14px;font-weight:600">'+esc(e.Title)+'</div>'+(e.Time?'<div style="font-size:12px;color:var(--muted);margin-top:2px">'+e.Time+'</div>':'')+(e.Notes?'<div style="font-size:12px;color:var(--muted);margin-top:2px">'+esc(e.Notes)+'</div>':'')+'</div>';});
  h+='<button class="btn-ghost" data-ds="'+ds+'" onclick="openAddEventOnDate(this.dataset.ds)">+ Add on this day</button>';
  document.getElementById('sheet-inner').innerHTML=h;openSheet();
}
function openAddEvent(){openAddEventOnDate(isoToday());}
function openAddEventOnDate(date){
  var h='<div class="sheet-title">Add event</div>';
  h+='<div class="form-row"><label>Title</label><input type="text" id="inp-ev-title" placeholder="Birthday, Anniversary, Meeting..."/></div>';
  h+='<div class="form-2"><div><label>Date</label><input type="date" id="inp-ev-date" value="'+date+'"/></div><div><label>Time (optional)</label><input type="time" id="inp-ev-time"/></div></div>';
  h+='<div class="form-row"><label>Type</label><select id="inp-ev-type"><option>General</option><option>Birthday</option><option>Anniversary</option><option>Reminder</option><option>Meeting</option><option>Holiday</option></select></div>';
  h+='<div class="form-row"><label>Notes</label><textarea id="inp-ev-notes" rows="2" placeholder="Optional..."></textarea></div>';
  h+='<div class="form-row"><label>Remind me</label><select id="inp-ev-remind"><option value="">No reminder</option><option value="0">On the day (9am)</option><option value="1">1 day before</option><option value="3">3 days before</option><option value="7">1 week before</option><option value="30">1 month before</option></select></div>';
  h+='<button class="btn-primary" onclick="submitEvent()">Save event</button>';
  document.getElementById('sheet-inner').innerHTML=h;openSheet();
}
function openAddReminder(title,date){
  var h='<div class="sheet-title">Set reminder</div>';
  h+='<div style="background:var(--bg3);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px">'+esc(title)+' &middot; '+formatDate(date)+'</div>';
  h+='<div class="form-2"><div><label>Before event</label><select id="inp-rem-before"><option value="0">On the day</option><option value="1">1 day before</option><option value="3">3 days before</option><option value="7">1 week before</option></select></div><div><label>Time</label><input type="time" id="inp-rem-time" value="09:00"/></div></div>';
  h+='<button class="btn-primary" data-t="'+esc(title)+'" data-d="'+date+'" onclick="submitReminder(this.dataset.t,this.dataset.d)">Set reminder</button>';
  document.getElementById('sheet-inner').innerHTML=h;openSheet();
}
async function submitEvent(){
  var title=document.getElementById('inp-ev-title').value.trim();
  if(!title){showToast('Enter a title');return;}
  var r=await apiPost('addEvent',{title:title,date:document.getElementById('inp-ev-date').value,time:document.getElementById('inp-ev-time').value,type:document.getElementById('inp-ev-type').value,notes:document.getElementById('inp-ev-notes').value,remind:document.getElementById('inp-ev-remind').value});
  if(r&&r.ok){closeSheet();showToast('Event saved!');loadCalendar();}
}
async function submitReminder(title,date){
  var r=await apiPost('addEvent',{title:'Reminder: '+title,date:date,time:document.getElementById('inp-rem-time').value,type:'Reminder',remind:document.getElementById('inp-rem-before').value});
  if(r&&r.ok){closeSheet();showToast('Reminder set!');}
}
// QUICK MEMORY
function quickMemory(text,source){
  var h='<div class="sheet-title">Save as memory</div>';
  h+='<div class="form-row"><label>Title</label><input type="text" id="inp-mem-t" value="'+esc(text||'')+'"/></div>';
  h+='<div class="form-row"><label>Description</label><textarea id="inp-mem-d" rows="2" placeholder="Add context..."></textarea></div>';
  h+='<div class="form-row"><label>Date</label><input type="date" id="inp-mem-dt" value="'+isoToday()+'"/></div>';
  h+='<div style="background:rgba(155,114,240,.1);border:1px solid rgba(155,114,240,.2);border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:11px;color:var(--purple)">&#x1F4A1; Appears on Today automatically on this date in 6 months and every year.</div>';
  h+='<button class="btn-primary" data-src="'+esc(source||'')+'" onclick="submitMemory(this.dataset.src)">Save to memory sheet</button>';
  document.getElementById('sheet-inner').innerHTML=h;openSheet();
}
async function submitMemory(source){
  var title=document.getElementById('inp-mem-t').value.trim();
  if(!title){showToast('Enter a title');return;}
  var r=await apiPost('addMemory',{title:title,description:document.getElementById('inp-mem-d').value,date:document.getElementById('inp-mem-dt').value,source:source||'manual'});
  if(r&&r.ok){closeSheet();showToast('Memory saved!');}
}
// PHOTO
function triggerCamera(id){var el=document.getElementById(id);if(!el)return;el.setAttribute('capture','environment');el.accept='image/*';el.click();}
function triggerGallery(id){var el=document.getElementById(id);if(!el)return;el.removeAttribute('capture');el.accept='image/*';el.click();}
function previewPhoto(pid,input){var p=document.getElementById(pid);if(!p||!input.files||!input.files[0])return;var reader=new FileReader();reader.onload=function(e){p.src=e.target.result;p.style.display='block';};reader.readAsDataURL(input.files[0]);}
function fileToBase64(file){return new Promise(function(resolve){var r=new FileReader();r.onload=function(e){resolve(e.target.result);};r.readAsDataURL(file);});}
function attachPhoto(ctx,id){
  var h='<div class="sheet-title">Attach photo</div>';
  h+='<div style="display:flex;gap:8px;margin-bottom:12px"><button onclick="triggerCamera("att-photo")" class="btn-ghost" style="margin-top:0;flex:1;padding:14px;color:var(--teal)">&#x1F4F7; Camera</button><button onclick="triggerGallery("att-photo")" class="btn-ghost" style="margin-top:0;flex:1;padding:14px;color:var(--accent)">&#x1F5BC; Gallery</button></div>';
  h+='<input type="file" id="att-photo" accept="image/*" style="display:none" onchange="previewPhoto("att-prev",this)"/>';
  h+='<img id="att-prev" style="width:100%;border-radius:8px;margin-bottom:10px;display:none;max-height:200px;object-fit:cover"/>';
  h+='<div class="form-row"><label>Caption</label><input type="text" id="att-caption" placeholder="What is this?"/></div>';
  h+='<button class="btn-primary" data-ctx="'+esc(ctx)+'" data-id="'+esc(String(id))+'" onclick="submitPhoto(this.dataset.ctx,this.dataset.id)">Upload</button>';
  document.getElementById('sheet-inner').innerHTML=h;openSheet();
}
async function submitPhoto(ctx,id){
  var pf=document.getElementById('att-photo');
  if(!pf||!pf.files||!pf.files[0]){showToast('Select a photo first');return;}
  showToast('Uploading...');
  var photoData=await fileToBase64(pf.files[0]);
  var r=await apiPost('attachPhoto',{context:ctx,refId:id,photoData:photoData,caption:document.getElementById('att-caption').value});
  if(r&&r.ok){closeSheet();showToast('Photo saved to Drive!');if(ctx==='journal')loadJournal();}
  else showToast('Upload failed - check Apps Script Drive permissions');
}
// PUSH
function openPushSetup(){
  var h='<div class="sheet-title">Push Notifications</div>';
  h+='<div style="background:rgba(91,138,240,.1);border:1px solid rgba(91,138,240,.2);border-radius:8px;padding:12px;margin-bottom:14px;font-size:12px;line-height:1.9;color:var(--muted)">';
  h+='<b style="color:var(--text)">One-time Firebase setup:</b><br>1. console.firebase.google.com<br>2. New project &rarr; Add web app<br>3. Project Settings &rarr; Cloud Messaging &rarr; Web Push certificates<br>4. Generate key pair &rarr; copy VAPID public key<br>5. Paste below &amp; tap Enable<br><br>';
  h+='<b style="color:var(--accent)">Morning (6:30 AM):</b> tasks, events, memories on this day.<br>';
  h+='<b style="color:var(--purple)">Night (10 PM):</b> pending tasks, day P&amp;L, balance, goal progress.';
  h+='</div>';
  h+='<div class="form-row"><label>Firebase VAPID Public Key</label><input type="text" id="inp-vapid" placeholder="Paste VAPID key..." value="'+esc(CFG.vapidKey)+'"/></div>';
  h+='<button class="btn-primary" onclick="saveAndEnablePush()">Save &amp; enable push</button>';
  h+='<button class="btn-ghost" onclick="testPushNow()" style="margin-top:8px">Send test notification now</button>';
  document.getElementById('sheet-inner').innerHTML=h;openSheet();
}
async function saveAndEnablePush(){
  CFG.vapidKey=document.getElementById('inp-vapid').value.trim();
  localStorage.setItem('vapidKey',CFG.vapidKey);
  if(!('serviceWorker' in navigator)||!('PushManager' in window)){showToast('Push not supported on this browser');return;}
  var p=await Notification.requestPermission();
  if(p!=='granted'){showToast('Permission denied in browser settings');return;}
  try{
    var reg=await navigator.serviceWorker.ready;
    var opts={userVisibleOnly:true};
    if(CFG.vapidKey)opts.applicationServerKey=CFG.vapidKey;
    var sub=await reg.pushManager.subscribe(opts);
    await apiPost('registerToken',{token:JSON.stringify(sub)});
    showToast('Push enabled! Morning 6:30am + night 10pm briefs active.');
  }catch(e){showToast('Setup failed: '+e.message);}
}
async function testPushNow(){
  var r=await apiPost('sendTestPush',{});
  showToast(r&&r.ok?'Test sent!':'Failed - check Firebase key in Apps Script');
}
</script>
